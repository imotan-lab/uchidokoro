<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜狙い目手帖</title>
<meta name="description" content="狙い目手帖へのお問い合わせはこちらから。記事の内容・誤り・ご意見などお気軽にどうぞ。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #111115;
    --border: #222230;
    --accent: #c8972a;
    --accent2: #e8b84a;
    --text: #ddd8cc;
    --text-muted: #7a7870;
    --text-sub: #aaa49a;
    --good: #4a9e6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; line-height: 1.8; font-size: 15px; display: flex; flex-direction: column; align-items: center; }
  body > *:not(header) { display: block; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto; padding-left: 16px; padding-right: 16px; }
  a { touch-action: manipulation; }
  header { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: rgba(12,12,14,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Shippori Mincho', serif; font-size: 1.05rem; font-weight: 800; color: var(--accent); text-decoration: none; letter-spacing: 0.08em; }
  .header-back { font-size: 0.75rem; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .mv { padding: 72px 16px 28px; border-bottom: 1px solid var(--border); }
  .mv-label { font-size: 0.6rem; color: var(--accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 10px; }
  .mv-title { font-family: 'Shippori Mincho', serif; font-size: clamp(1.4rem, 6vw, 2rem); font-weight: 800; line-height: 1.4; margin-bottom: 10px; }
  .mv-title em { color: var(--accent); font-style: normal; }
  .mv-desc { font-size: 0.8rem; color: var(--text-sub); line-height: 1.9; }
  .contact-wrap { padding: 24px 16px 48px; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 20px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .field label .req { color: var(--accent); margin-left: 4px; }
  .field input, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 0.88rem; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; outline: none; transition: border-color 0.2s; appearance: none; -webkit-appearance: none; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 140px; line-height: 1.8; }
  .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent) 0%, #a07320 100%); border: none; border-radius: 10px; color: #0c0c0e; font-size: 1rem; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.2s, transform 0.1s; }
  .submit-btn:active { opacity: 0.85; transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .success-msg { display: none; background: linear-gradient(135deg, #0e1f12 0%, #111115 100%); border: 2px solid var(--good); border-radius: 14px; padding: 32px 20px; text-align: center; margin-bottom: 16px; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .success-msg .s-icon { font-size: 2.6rem; margin-bottom: 12px; }
  .success-msg .s-title { font-size: 1rem; font-weight: 700; color: var(--good); margin-bottom: 8px; }
  .success-msg .s-desc { font-size: 0.82rem; color: var(--text-sub); line-height: 1.9; }
  footer { max-width: 600px; margin: 0 auto; padding: 32px 16px; border-top: 1px solid var(--border); text-align: center; }
  .footer-logo { font-family: 'Shippori Mincho', serif; font-size: 1rem; color: var(--accent); font-weight: 800; margin-bottom: 12px; }
  .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
  .footer-links a { font-size: 0.72rem; color: var(--text-muted); text-decoration: none; }
  .footer-copy { font-size: 0.68rem; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">狙い目手帖</a>
  <a href="index.html" class="header-back">← 機種一覧へ</a>
</header>

<div class="mv">
  <div class="mv-label">CONTACT</div>
  <h1 class="mv-title"><em>お問い合わせ</em></h1>
  <p class="mv-desc">記事の内容に関するご意見・誤りのご指摘など、<br>お気軽にお問い合わせください。</p>
</div>

<div class="contact-wrap">
  <div class="success-msg" id="successMsg">
    <div class="s-icon">✅</div>
    <div class="s-title">送信が完了しました</div>
    <div class="s-desc">お問い合わせありがとうございます。<br>内容を確認の上、ご連絡いたします。</div>
  </div>

  <div class="form-card" id="formCard">
    <div class="field">
      <label for="name">お名前<span class="req">*</span></label>
      <input type="text" id="name" placeholder="例：山田 太郎" required>
    </div>
    <div class="field">
      <label for="email">メールアドレス<span class="req">*</span></label>
      <input type="email" id="email" placeholder="例：example@email.com" required>
    </div>
    <div class="field">
      <label for="message">お問い合わせ内容<span class="req">*</span></label>
      <textarea id="message" placeholder="ご質問・ご意見・記事の誤りのご指摘など、お気軽にどうぞ。" required></textarea>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">送信する</button>
  </div>
</div>

<div style="margin: 0 16px 32px; text-align: center;">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 24px;color:var(--accent);text-decoration:none;font-size:0.85rem;font-weight:700;">← 機種一覧へ戻る</a>
</div>

<footer>
  <div class="footer-logo">狙い目手帖</div>
  <div class="footer-links">
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="contact.html">お問い合わせ</a>
  </div>
  <p class="footer-copy">掲載内容は公開情報をもとにした考察です。実際の立ち回りはご自身の判断でお願いします。</p>
  <p class="footer-copy" style="margin-top:6px;">© 2025 狙い目手帖</p>
</footer>

<script>
  async function submitForm() {
    const name    = document.getElementById('name').value.trim();
    const email   = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();
    if (!name || !email || !message) { alert('すべての項目を入力してください。'); return; }
    const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailReg.test(email)) { alert('メールアドレスの形式が正しくありません。'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';
    const FORM_ID = '1FAIpQLSfM2HFyvD5rlVx-ETRb5gMyW4pq5Mpbke4ed1wphlb8cL_qTg';
    const url = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;
    const body = new FormData();
    body.append('entry.801635101', name);
    body.append('entry.924750146', email);
    body.append('entry.307802134', message);
    try { await fetch(url, { method: 'POST', mode: 'no-cors', body }); } catch(e) {}
    document.getElementById('formCard').style.display = 'none';
    const msg = document.getElementById('successMsg');
    msg.style.display = 'block';
    msg.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
