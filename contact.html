<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜狙い目手帖</title>
<meta name="description" content="狙い目手帖へのお問い合わせはこちらから。記事の内容・誤り・ご意見などお気軽にどうぞ。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #111115;
    --border: #222230;
    --accent: #c8972a;
    --accent2: #e8b84a;
    --text: #ddd8cc;
    --text-muted: #7a7870;
    --text-sub: #aaa49a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; line-height: 1.8; font-size: 15px; }
  body > *:not(header) { max-width: 600px; margin-left: auto; margin-right: auto; }
  a { touch-action: manipulation; }

  header { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: rgba(12,12,14,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Shippori Mincho', serif; font-size: 1.05rem; font-weight: 800; color: var(--accent); text-decoration: none; letter-spacing: 0.08em; }
  .header-back { font-size: 0.75rem; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }

  .mv { padding: 72px 16px 28px; border-bottom: 1px solid var(--border); }
  .mv-label { font-size: 0.6rem; color: var(--accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 10px; }
  .mv-title { font-family: 'Shippori Mincho', serif; font-size: clamp(1.4rem, 6vw, 2rem); font-weight: 800; line-height: 1.4; margin-bottom: 10px; }
  .mv-title em { color: var(--accent); font-style: normal; }
  .mv-desc { font-size: 0.8rem; color: var(--text-sub); line-height: 1.9; }

  .contact-wrap { padding: 24px 16px 48px; }

  p { font-size: 0.84rem; color: var(--text-sub); line-height: 2; margin-bottom: 20px; }

  .form-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  iframe {
    display: block;
    width: 100%;
    height: 640px;
    border: none;
    background: transparent;
  }

  .note { font-size: 0.76rem; color: var(--text-muted); background: var(--surface); border-left: 3px solid var(--accent); padding: 10px 12px; border-radius: 0 6px 6px 0; margin-top: 16px; line-height: 1.8; }

  footer { max-width: 600px; margin: 0 auto; padding: 32px 16px; border-top: 1px solid var(--border); text-align: center; }
  .footer-logo { font-family: 'Shippori Mincho', serif; font-size: 1rem; color: var(--accent); font-weight: 800; margin-bottom: 12px; }
  .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
  .footer-links a { font-size: 0.72rem; color: var(--text-muted); text-decoration: none; }
  .footer-copy { font-size: 0.68rem; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">狙い目手帖</a>
  <a href="index.html" class="header-back">← 機種一覧へ</a>
</header>

<div class="mv">
  <div class="mv-label">CONTACT</div>
  <h1 class="mv-title"><em>お問い合わせ</em></h1>
  <p class="mv-desc">記事の内容に関するご意見・誤りのご指摘など、<br>お気軽にお問い合わせください。</p>
</div>

<div class="contact-wrap">
  <p>通常2〜3営業日以内にご返信いたします。お急ぎの場合はご了承ください。</p>

  <div class="form-container">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSfM2HFyvD5rlVx-ETRb5gMyW4pq5Mpbke4ed1wphlb8cL_qTg/viewform?embedded=true"
      title="お問い合わせフォーム"
      loading="lazy">
      読み込んでいます…
    </iframe>
  </div>

  <p class="note">💡 フォームが表示されない場合は<a href="https://forms.gle/FRi82BoCwbsDhj4S9" target="_blank" rel="noopener" style="color:var(--accent);">こちら</a>からお問い合わせください。</p>
</div>

<div style="margin: 0 16px 32px; text-align: center;">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 24px;color:var(--accent);text-decoration:none;font-size:0.85rem;font-weight:700;">← 機種一覧へ戻る</a>
</div>

<footer>
  <div class="footer-logo">狙い目手帖</div>
  <div class="footer-links">
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="contact.html">お問い合わせ</a>
  </div>
  <p class="footer-copy">掲載内容は公開情報をもとにした考察です。実際の立ち回りはご自身の判断でお願いします。</p>
  <p class="footer-copy" style="margin-top:6px;">© 2025 狙い目手帖</p>
</footer>

</body>
</html>
