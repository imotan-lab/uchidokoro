<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマスロ 北斗の拳 天井・狙い目まとめ｜やめどき・リセット恩恵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0c0e;--surface:#111115;--surface2:#18181e;--border:#222230;--accent:#c8972a;--accent2:#e8b84a;--text:#ddd8cc;--text-muted:#7a7870;--text-sub:#aaa49a;--good:#4a9e6a;--warn:#c8972a;--bad:#9e4a4a}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;line-height:1.8;padding-bottom:100px}
  .container{max-width:600px;margin:0 auto;padding:0 16px}
  header{padding:40px 0 20px;text-align:center}
  .page-title{font-family:'Shippori Mincho',serif;font-size:24px;color:var(--accent2);margin-bottom:8px}
  .section-title{font-family:'Shippori Mincho',serif;font-size:20px;color:var(--accent);border-left:3px solid var(--accent);padding-left:12px;margin:40px 0 20px}

  /* ★修正ポイント：目次(#toc)とカード(.card)の幅を完全に統一★ */
  .card, #toc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    width: 100%;
    box-sizing: border-box; /* paddingを含めた幅計算にする */
    padding: 20px; /* 余白を20pxで統一 */
  }

  #toc { list-style: none; }
  #toc-title { font-weight: 700; color: var(--accent2); margin-bottom: 12px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  #toc ul { padding-left: 20px; margin: 0; }
  #toc li { margin-bottom: 10px; }
  #toc a { color: var(--text-sub); text-decoration: none; font-size: 14px; transition: 0.2s; border-bottom: 1px solid transparent; }
  #toc a:hover { color: var(--accent); border-bottom: 1px solid var(--accent); }

  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{border:1px solid var(--border);padding:10px;text-align:center;font-size:14px}
  th{background:var(--surface2);color:var(--text-sub);font-weight:400}
  .highlight{color:var(--accent2);font-weight:700}

  .checker-banner{display:flex;align-items:center;background:linear-gradient(135deg,#1e1e26,#111115);border:1px solid var(--accent);border-radius:12px;padding:16px;text-decoration:none;color:inherit;margin:20px 0}
  .cb-icon{font-size:24px;margin-right:12px}
  .cb-title{font-weight:700;color:var(--accent2)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="page-title">スマスロ 北斗の拳</div>
  </header>

  <nav id="toc">
    <div id="toc-title"><span>📍</span>目次</div>
    <ul>
      <li><a href="#tenjo">天井情報・恩恵</a></li>
      <li><a href="#line">狙い目ライン</a></li>
      <li><a href="#yame">やめどき</a></li>
    </ul>
  </nav>

  <section id="tenjo">
    <h2 class="section-title">天井情報・恩恵</h2>
    <div class="card">
      <p>・通常時最大<span class="highlight">1268G+α</span>でBB確定</p>
      <p>・設定変更時は天井が<span class="highlight">800G+α</span>に短縮</p>
      <p>・天井到達時の恩恵：継続率79%以上のBB比率がアップ</p>
    </div>
  </section>

  <section id="line">
    <h2 class="section-title">狙い目ライン</h2>
    <div class="card">
      <table>
        <tr><th>状況</th><th>等価</th><th>5.6枚</th></tr>
        <tr><td>通常</td><td>600G〜</td><td>700G〜</td></tr>
        <tr><td>リセット</td><td>150G〜</td><td>250G〜</td></tr>
      </table>
    </div>
  </section>

  <section id="yame">
    <h2 class="section-title">やめどき</h2>
    <div class="card">
      <p>・BB終了後、天国モード否定を確認してやめ。</p>
      <p>・1G連・即前兆の可能性があるため数Gは様子見推奨。</p>
    </div>
  </section>

  <a href="hokuto_checker.html" class="checker-banner">
    <div class="cb-icon">⚡</div>
    <div class="cb-body">
      <div class="cb-title">北斗の拳 狙い目チェッカー</div>
      <p style="font-size:12px;color:var(--text-sub)">G数を入れるだけで即判定</p>
    </div>
  </a>

  <div style="text-align:center;margin-top:40px">
    <a href="index.html" style="color:var(--text-sub);text-decoration:none">← 機種一覧に戻る</a>
  </div>
</div>
</body>
</html>
