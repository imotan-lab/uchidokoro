<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマスロ 北斗の拳 狙い目チェッカー｜G数・リセット入力で即判定</title>
<meta name="description" content="スマスロ北斗の拳の狙い目チェッカー。G数・リセット有無・換金率を入力するだけで◎○△×で即判定。天井狙い・リセット狙いの期待値判断に。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #111115;
    --surface2: #18181e;
    --border: #222230;
    --accent: #c8972a;
    --accent2: #e8b84a;
    --text: #ddd8cc;
    --text-muted: #7a7870;
    --text-sub: #aaa49a;
    --good: #4a9e6a;
    --warn: #c8972a;
    --bad: #9e4a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    line-height: 1.8;
    font-size: 15px;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  body > *:not(header) {
    display: block;
    width: 100%;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    padding-left: 16px;
    padding-right: 16px;
  }
  a, button { touch-action: manipulation; }

  /* ===== ヘッダー ===== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: rgba(12,12,14,0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.08em;
  }

  .header-back {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ===== ヒーロー ===== */
  .mv {
    padding: 72px 16px 28px;
    border-bottom: 1px solid var(--border);
  }

  .mv-label {
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .mv-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(1.3rem, 5.5vw, 1.8rem);
    font-weight: 800;
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .mv-title em { color: var(--accent); font-style: normal; }

  .mv-desc {
    font-size: 0.8rem;
    color: var(--text-sub);
    line-height: 1.9;
  }

  /* ===== チェッカー本体 ===== */
  .checker-wrap {
    padding: 24px 16px 0;
  }

  .checker-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    margin-bottom: 16px;
  }

  .checker-card-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }

  /* ===== 入力フォーム ===== */
  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .form-label span {
    font-size: 0.68rem;
    font-weight: 300;
    color: var(--text-muted);
    margin-left: 6px;
  }

  .g-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .g-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    text-align: right;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    appearance: textfield;
    -moz-appearance: textfield;
  }

  .g-input::-webkit-outer-spin-button,
  .g-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .g-input:focus { border-color: var(--accent); }

  .g-unit {
    font-size: 0.85rem;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* トグルボタン */
  .toggle-group {
    display: flex;
    gap: 8px;
  }

  .toggle-btn {
    flex: 1;
    padding: 11px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text-muted);
    font-size: 0.8rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
  }

  .toggle-btn.active {
    border-color: var(--accent);
    background: rgba(200,151,42,0.1);
    color: var(--accent2);
  }

  /* 判定ボタン */
  .judge-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #a07320 100%);
    border: none;
    border-radius: 10px;
    color: #0c0c0e;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .judge-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* ===== 判定結果 ===== */
  .result-wrap {
    padding: 0 16px;
    display: none;
  }

  .result-wrap.show { display: block; }

  .result-card {
    border-radius: 14px;
    padding: 22px 18px;
    margin-bottom: 16px;
    border: 2px solid transparent;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-card.rank-S {
    background: linear-gradient(135deg, #0e1f12 0%, #111115 100%);
    border-color: var(--good);
  }
  .result-card.rank-A {
    background: linear-gradient(135deg, #1a1c0e 0%, #111115 100%);
    border-color: #7ab83e;
  }
  .result-card.rank-B {
    background: linear-gradient(135deg, #1a1508 0%, #111115 100%);
    border-color: var(--warn);
  }
  .result-card.rank-C {
    background: var(--surface);
    border-color: var(--border);
  }
  .result-card.rank-X {
    background: linear-gradient(135deg, #1f0e0e 0%, #111115 100%);
    border-color: var(--bad);
  }

  .result-rank {
    font-size: 3.2rem;
    font-weight: 700;
    font-family: 'Shippori Mincho', serif;
    line-height: 1;
    margin-bottom: 6px;
  }

  .rank-S .result-rank { color: var(--good); }
  .rank-A .result-rank { color: #7ab83e; }
  .rank-B .result-rank { color: var(--warn); }
  .rank-C .result-rank { color: var(--text-muted); }
  .rank-X .result-rank { color: var(--bad); }

  .result-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }

  .rank-S .result-label { color: var(--good); }
  .rank-A .result-label { color: #7ab83e; }
  .rank-B .result-label { color: var(--warn); }
  .rank-C .result-label { color: var(--text-muted); }
  .rank-X .result-label { color: var(--bad); }

  .result-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .result-detail {
    font-size: 0.8rem;
    color: var(--text-sub);
    line-height: 1.9;
  }

  /* 詳細情報ボックス */
  .result-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .result-info-title {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .result-info table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  .result-info td {
    padding: 7px 6px;
    border-bottom: 1px solid var(--border);
    color: var(--text-sub);
    vertical-align: middle;
  }

  .result-info tr:last-child td { border-bottom: none; }

  .result-info td:first-child { color: var(--text-muted); font-size: 0.74rem; }
  .result-info td:last-child { text-align: right; font-weight: 700; }

  .note-box {
    background: var(--surface);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 16px;
  }

  /* 特殊バッジ */
  .special-badge {
    display: inline-block;
    background: rgba(200,151,42,0.15);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  /* リセットボタン */
  .reset-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-size: 0.82rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }

  .reset-btn:active { border-color: var(--accent); }

  /* ===== 記事リンク ===== */
  .article-link {
    margin: 0 16px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .article-link:active { opacity: 0.85; }
  .al-icon { font-size: 1.6rem; flex-shrink: 0; }
  .al-body { flex: 1; min-width: 0; }
  .al-label { font-size: 0.58rem; color: var(--accent); font-weight: 700; letter-spacing: 0.15em; margin-bottom: 3px; }
  .al-title { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .al-desc { font-size: 0.68rem; color: var(--text-muted); }
  .al-arr { color: var(--accent); font-size: 1.2rem; flex-shrink: 0; }

  /* ===== フッター ===== */
  footer {
    max-width: 600px;
    margin: 0 auto;
    padding: 32px 16px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .footer-logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 1rem;
    color: var(--accent);
    font-weight: 800;
    margin-bottom: 12px;
  }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 12px;
  }

  .footer-links a {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-decoration: none;
  }

  .footer-copy {
    font-size: 0.68rem;
    color: var(--text-muted);
  }
</style>

</head>
<body class="machine-checker">

<!-- ヘッダー -->
<header>
  <a href="index.html" class="logo">狙い目手帖</a>
  <a href="hokuto_article.html" class="header-back">← 北斗の拳 記事へ</a>
</header>

<div class="mv">
  <div class="mv-label">FREE TOOL · HOKUTO NO KEN</div>

  <p class="mv-desc">G数・リセット有無・換金率を入力するだけで<br>今すぐ狙えるか <strong>◎○△×</strong> で即判定します。</p>
</div>

<!-- チェッカー入力 -->
<div class="checker-wrap">
  <div class="checker-card">
    <div class="checker-card-title">⚡ 条件を入力してください</div>

    <!-- G数入力 -->
    <div class="form-group">
      <label class="form-label" for="gInput">現在のG数<span>データカウンターの数値をそのまま入力</span></label>
      <div class="g-input-row">
        <input type="number" id="gInput" class="g-input" placeholder="0" min="0" max="2000" inputmode="numeric">
        <span class="g-unit">G</span>
      </div>

    <!-- リセット有無 -->
    <div class="form-group">

        <button class="toggle-btn active" id="btn-reset-no" onclick="selectReset('no')">不明 / 据え置き</button>

    <!-- 換金率 -->
    <div class="form-group">
      <label class="form-label">換金率</label>

<!-- 判定結果 -->
<div class="result-wrap" id="resultWrap">
  <div class="result-card" id="resultCard">
    <div class="special-badge" id="specialBadge" style="display:none;"></div>
    <div class="result-rank" id="resultRank"></div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-detail" id="resultDetail"></div>
  </div>

  <div class="result-info" id="resultInfo">
    <div class="result-info-title">📊 判定根拠</div>
    <table id="resultTable"></table>
  </div>

  <div class="note-box" id="resultNote"></div>

  <button class="reset-btn" onclick="resetForm()">↩ もう一度入力する</button>
</div>

<!-- 記事リンク -->
<a href="hokuto_article.html" class="article-link">

</a>

</footer>

<script>
  let resetMode = 'no';
  let rateMode = 'equal';

  function selectReset(val) {
    resetMode = val;
    document.getElementById('btn-reset-no').classList.toggle('active', val === 'no');
    document.getElementById('btn-reset-yes').classList.toggle('active', val === 'yes');
  }

  function selectRate(val) {
    rateMode = val;
    document.getElementById('btn-rate-eq').classList.toggle('active', val === 'equal');
    document.getElementById('btn-rate-56').classList.toggle('active', val === '5.6');
  }

  function judge() {
    const g = parseInt(document.getElementById('gInput').value) || 0;
    const isReset = resetMode === 'yes';
    const isEqual = rateMode === 'equal';

    let rank, rankClass, label, title, detail, note, special = null;
    let tableRows = [];

    // 天井ライン
    const targetG = isReset ? 800 : (isEqual ? 600 : 700);
    const remain = Math.max(0, targetG - g);

    // ===== 判定ロジック =====

    if (isReset) {
      // リセット確定台
      rank = '◎';
      rankClass = 'rank-S';
      label = '最優先で着席';
      title = 'リセット確定台 — 即着席でOK';
      detail = '設定変更後は天井が800G+αに短縮。継続率優遇・北斗揃い優遇が有効のまま天井へ向かうため、0Gから着席しても期待値はプラス。深いほど有利です。';
      note = '💡 ガックンチェック不可（サミー機はガックンしない）。有利区間ランプでの判別も不可のため、前日データのハマり＋当日0Gスタートでリセットを判断してください。';
      tableRows = [
        ['台の状態', 'リセット確定'],
        ['天井', '800G+α（短縮）'],
        ['継続率優遇', 'あり ✅'],
        ['北斗揃い優遇', 'あり ✅'],
        ['推奨開始G数', '0G〜（即着席）'],
      ];
      special = '🔥 リセット確定 — 優遇天井';

    } else if (g >= 760 && g <= 800) {
      // 777G付近
      rank = '◎';
      rankClass = 'rank-S';
      label = '777G付近 — 特殊チャンス';
      title = '777G短縮抽選が近い — 北斗揃い確定の可能性';
      detail = '777Gで天井短縮抽選に当選した場合、北斗揃い（最高継続率）が確定。通常天井より圧倒的に出玉が期待できる。このG数帯は非常に価値が高いです。';
      note = '💡 777G到達前に捨てられた台なら絶好の拾い物。777Gの短縮抽選を経由して最大32G以内でATへ突入します。';
      tableRows = [
        ['現在G数', `${g}G`],
        ['777G短縮抽選まで', `約${Math.max(0, 777 - g)}G`],
        ['777G当選時', '北斗揃い確定（最高継続率）'],
        ['天井まで', `${Math.max(0, 1268 - g)}G`],
        ['換金率', isEqual ? '等価' : '5.6枚交換'],
      ];
      special = '⭐ 777G付近 — 特殊狙い目';

    } else if (g >= (isEqual ? 600 : 700)) {
      // 天井狙いライン以上
      if (g >= 1000) {
        rank = '◎';
        rankClass = 'rank-S';
        label = '即着席推奨';
        title = `${g}G — 天井まで${Math.max(0, 1268 - g)}G、期待値大`;
        detail = `深いハマりほど天井到達時の期待枚数が上昇。1,000G超えは天井からの連チャンにも大きく期待できます。${isEqual ? '等価' : '5.6枚交換'}なら即着席でOK。`;
        note = '⚠️ 1,000G超えはリスクも高め。天井到達後の連チャン（継続率優遇）に期待しましょう。';
      } else if (g >= 800) {
        rank = '◎';
        rankClass = 'rank-S';
        label = '即着席推奨';
        title = `${g}G — 狙い目ライン超え、期待値プラス`;
        detail = `${isEqual ? '等価600G' : '5.6枚700G'}以上の天井狙いラインを大きく超えています。800G付近は天井短縮抽選（800G）のチャンスでもあり、期待値は高い水準。`;
        note = '💡 800G短縮抽選に当選した場合も最大32G以内でAT突入。継続率優遇・北斗揃い優遇はなし。';
      } else {
        rank = '◎';
        rankClass = 'rank-S';
        label = '即着席推奨';
        title = `${g}G — 狙い目ライン突破、積極的に狙えます`;
        detail = `${isEqual ? '等価は600G〜' : '5.6枚交換は700G〜'}が期待値プラスのライン。現在はそれを超えているため、着席してOK。深くなるほど期待値は上昇します。`;
        note = '💡 天井1,268G（リセットなし）。高いほど恩恵が大きくなります。';
      }
      tableRows = [
        ['現在G数', `${g}G`],
        ['天井まで', `${Math.max(0, 1268 - g)}G`],
        ['狙い目ライン', isEqual ? '600G〜（等価）' : '700G〜（5.6枚）'],
        ['800G短縮抽選', `あと${Math.max(0, 800 - g)}G（当選なら32G以内にAT）`],
        ['換金率', isEqual ? '等価' : '5.6枚交換'],
      ];

    } else if (g >= (isEqual ? 500 : 600)) {
      // 狙い目ラインに近いが届いていない
      rank = '○';
      rankClass = 'rank-A';
      label = '条件付きで狙える';
      title = `${g}G — あと${remain}Gで狙い目ライン`;
      detail = `狙い目ライン（${isEqual ? '等価600G' : '5.6枚700G'}）まであと${remain}G。投資額によっては期待値が小さくなるため、ライン到達まで待ってから着席するのが理想。すでに台が取られそうなら今から座っても許容範囲。`;
      note = '💡 狙い目ラインに近いほど期待値はプラスに傾きます。前の人のやめどきを見極めて判断を。';
      tableRows = [
        ['現在G数', `${g}G`],
        ['狙い目ラインまで', `あと${remain}G`],
        ['天井まで', `${Math.max(0, 1268 - g)}G`],
        ['換金率', isEqual ? '等価' : '5.6枚交換'],
        ['判定', '条件付きで可（早入りリスクあり）'],
      ];

    } else if (g >= 300) {
      // 300G付近（短縮抽選ポイント）
      rank = '△';
      rankClass = 'rank-B';
      label = '基本は見送り';
      title = `${g}G — 狙い目ラインまであと${remain}G`;
      detail = `まだ狙い目ライン（${isEqual ? '等価600G' : '5.6枚700G'}）には${remain}G足りません。この状態で着席すると期待値マイナスになる可能性が高い。ただし300Gは短縮抽選ポイントのため、前の人のやめどきを観察する価値はあります。`;
      note = '⚠️ 300G短縮抽選は高設定ほど当選しやすい設計。ただし着席してまで狙うラインではありません。';
      tableRows = [
        ['現在G数', `${g}G`],
        ['狙い目ラインまで', `あと${remain}G`],
        ['300G短縮抽選', g < 300 ? `あと${300 - g}G` : '通過済み'],
        ['換金率', isEqual ? '等価' : '5.6枚交換'],
        ['判定', '見送り推奨'],
      ];

    } else {
      // 低G数
      rank = '×';
      rankClass = 'rank-X';
      label = '見送り';
      title = `${g}G — 狙い目ラインまでまだ${remain}G`;
      detail = `狙い目ライン（${isEqual ? '等価600G' : '5.6枚700G'}）まで${remain}G以上あります。この段階で着席すると大きく期待値マイナスになるため、見送りが賢明です。`;
      note = '💡 この台が気になるなら、ラインを超えてから着席するか他の台を探しましょう。リセット確定台なら0Gから狙えます。';
      tableRows = [
        ['現在G数', `${g}G`],
        ['狙い目ラインまで', `あと${remain}G`],
        ['換金率', isEqual ? '等価' : '5.6枚交換'],
        ['判定', '見送り'],
      ];
    }

    // DOM更新
    const card = document.getElementById('resultCard');
    card.className = `result-card ${rankClass}`;

    const specialEl = document.getElementById('specialBadge');
    if (special) {
      specialEl.textContent = special;
      specialEl.style.display = 'inline-block';
    } else {
      specialEl.style.display = 'none';
    }

    document.getElementById('resultRank').textContent = rank;
    document.getElementById('resultLabel').textContent = label;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultDetail').textContent = detail;
    document.getElementById('resultNote').textContent = note;

    const table = document.getElementById('resultTable');
    table.innerHTML = tableRows.map(([k, v]) =>
      `<tr><td>${k}</td><td>${v}</td></tr>`
    ).join('');

    const wrap = document.getElementById('resultWrap');
    wrap.classList.add('show');
    wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetForm() {
    document.getElementById('gInput').value = '';
    selectReset('no');
    selectRate('equal');
    document.getElementById('resultWrap').classList.remove('show');
    document.querySelector('.checker-wrap').scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
