<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うちどころ。| 機種一覧</title>
<meta name="description" content="スマホで使いやすいスロット狙い目一覧。機種名検索から記事とチェッカーへすぐ移動できます。">
<link rel="stylesheet" href="assets/css/practical.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner header-inner--center">
    <a class="brand" href="index.html"><img src="assets/img/logo.png" alt="うちどころ。" style="height:36px;width:auto;display:block;"></a>
  </div>
</header>
<main class="site-main">
  <section class="hero-panel">
    <p class="eyebrow">SLOT AIMING TOOL</p>
    <h1 class="page-title">ホールで即判断<br>G数を入れるだけ</h1>
    <p class="hero-sub">機種を選んでG数を入力するだけで、打っていいか即判定できます。<br>通常・リセット別対応。</p>
  </section>

  <section class="toolbar" aria-label="検索エリア">
    <label class="visually-hidden" for="machineSearch">機種名検索</label>
    <input id="machineSearch" class="search-input" type="search" placeholder="機種名で検索（例: 北斗、バキ、ゴッドイーター）">
  </section>

  <div id="listHeader" class="list-header">
    <p class="list-header-title">人気機種 TOP10</p>
    <p class="list-header-sub">直近7日間のYouTube動画数をもとに毎日自動更新</p>
  </div>
  <section id="machineList" class="machine-list"></section>
  <div id="machineEmpty" class="empty-card">該当する機種がありません。</div>
  <div id="showAllWrap" class="show-all-wrap">
    <button id="showAllBtn" class="btn-show-all">全機種を見る ›</button>
  </div>
</main>

<footer>
  <div class="site-footer-inner">
    <div class="footer-links">
      <a href="contact.html">お問い合わせ</a>
      <a href="privacy.html">プライバシーポリシー</a>
    </div>
    <p class="footer-copy">© 2026 うちどころ。</p>
  </div>
</footer>

<script>
function normalizeText(value){
  return String(value || "")
    .toLowerCase()
    .replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
    .replace(/[\s\-\_ー]/g, "");
}

function buildKeywords(machine){
  const base = [machine.name, machine.slug, machine.info, machine.strategy];
  const map = {
    hokuto: ["ほくと", "北斗", "北斗の拳", "スマスロ北斗", "スマスロ北斗の拳"],
    hokuto_tensei2: ["転生", "てんせい", "北斗転生2", "ほくとてんせい2"],
    tokyo_ghoul: ["とうきょうぐーる", "ぐーる", "グール"],
    sf5: ["すと5", "スト5", "streetfighter5"],
    monkeyv: ["モンキー", "monkey", "モンキーターン"],
    godeater: ["ごっどいーたー", "ge", "god eater"],
    goblin: ["ゴブスレ", "ごぶすれ"],
    valvrave2: ["vvv", "ヴヴヴ2", "v2"],
    kabaneri: ["かばねり", "甲鉄城"],
    kaguya: ["かぐや", "かぐやさま"],
    koukaku: ["こうかく", "攻殻"],
    tensura: ["てんすら"],
    tekken6: ["てっけん", "鉄拳"],
    chibaryo2: ["ちばりよ", "チバリヨ"],
    banchou4: ["ばんちょう4", "番長"],
    biohazard: ["ばいお", "バイオ"],
    dumbbell: ["だんべる"],
    baki: ["ばき"]
  };
  return [...base, ...(map[machine.slug] || [])].map(normalizeText).join("|");
}

(async function loadMachines(){
  const list = document.getElementById("machineList");
  const count = document.getElementById("machineCount");
  const heroCount = document.getElementById("heroCount");
  const search = document.getElementById("machineSearch");
  const empty = document.getElementById("machineEmpty");

  try {
    const res = await fetch("assets/data/machines.json");
    if (!res.ok) throw new Error("machines.json load failed");
    const machines = await res.json();
    const prepared = machines.map(machine => ({ ...machine, __keywords: buildKeywords(machine) }));

    const TOP_COUNT = 10;
    let showAll = false;

    const listHeader = document.getElementById("listHeader");
    const showAllWrap = document.getElementById("showAllWrap");
    const showAllBtn = document.getElementById("showAllBtn");

    showAllBtn.addEventListener("click", () => {
      showAll = true;
      showAllWrap.style.display = "none";
      listHeader.querySelector(".list-header-title").textContent = "全機種一覧";
      listHeader.querySelector(".list-header-sub").textContent = "";
      render(search.value);
    });

    function render(keyword = "") {
      const query = normalizeText(keyword);
      const allFiltered = prepared.filter(machine => !query || machine.__keywords.includes(query));
      // 検索時・全件表示時は全件、それ以外は上位10機種のみ
      const filtered = (query || showAll) ? allFiltered : allFiltered.slice(0, TOP_COUNT);
      // 検索中・全件表示中はヘッダーとボタンを制御
      if (query) {
        listHeader.querySelector(".list-header-title").textContent = `「${keyword}」の検索結果`;
        listHeader.querySelector(".list-header-sub").textContent = allFiltered.length + "件";
        showAllWrap.style.display = "none";
      } else if (!showAll) {
        listHeader.querySelector(".list-header-title").textContent = "人気機種 TOP10";
        listHeader.querySelector(".list-header-sub").textContent = "直近7日間のYouTube動画数をもとに毎日自動更新";
        showAllWrap.style.display = allFiltered.length > TOP_COUNT ? "block" : "none";
      }
      list.innerHTML = "";
      if (!filtered.length) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      filtered.forEach((machine, i) => {
        const row = document.createElement("article");
        row.className = "list-row";
        row.innerHTML = `
          <span class="list-rank">${i + 1}</span>
          <a class="machine-name-link" href="machine.html?slug=${machine.slug}" style="flex:1;">
            <span class="machine-name">${machine.name}</span>
          </a>
          <span class="list-arrow">›</span>
        `;
        list.appendChild(row);
      });
    }

    search.addEventListener("input", event => render(event.target.value));
    render();

  } catch (error) {
    count.textContent = "エラー";
    heroCount.textContent = "エラー";
    empty.style.display = "block";
    empty.textContent = "機種一覧の読み込みに失敗しました。";
  }
})();
</script>
</body>
</html>
