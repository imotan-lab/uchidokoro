<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狙い目手帖 | 機種一覧</title>
<meta name="description" content="スマホで使いやすいスロット狙い目一覧。機種名検索から記事とチェッカーへすぐ移動できます。">
<link rel="stylesheet" href="assets/css/practical.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">狙い目手帖</a>
    <nav class="nav-links">
      <a href="index.html">機種一覧</a>
      <a href="contact.html">お問い合わせ</a>
      <a href="privacy.html">ポリシー</a>
    </nav>
  </div>
</header>

<main class="site-main">
  <section class="hero-panel">
    <p class="eyebrow">MACHINE INDEX</p>
    <h1 class="page-title">ホールで即判断できる機種一覧</h1>
    <p class="hero-sub">検索して、記事を見るか、すぐチェッカーに入るだけの実用寄りUIに整理しました。</p>
    <div class="hero-meta">
      <div class="meta-chip"><span class="meta-label">優先</span><span class="meta-value">スマホ操作</span></div>
      <div class="meta-chip"><span class="meta-label">主役</span><span class="meta-value">チェッカー</span></div>
      <div class="meta-chip"><span class="meta-label">表示</span><span id="heroCount" class="meta-value">読込中</span></div>
    </div>
  </section>

  <section class="toolbar" aria-label="検索エリア">
    <label class="visually-hidden" for="machineSearch">機種名検索</label>
    <input id="machineSearch" class="search-input" type="search" placeholder="機種名検索 例: 北斗 / ほくと / hokuto / 東京喰種">
    <div id="machineCount" class="count-box">読込中</div>
  </section>

  <section id="machineList" class="machine-list"></section>
  <div id="machineEmpty" class="empty-card">該当する機種がありません。</div>
</main>

<footer>
  <div class="site-footer-inner">© 2026 狙い目手帖</div>
</footer>

<script>
function normalizeText(value){
  return String(value || "")
    .toLowerCase()
    .replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
    .replace(/[\s\-_ー]/g, "");
}

function buildKeywords(machine){
  const base = [machine.name, machine.slug, machine.info, machine.strategy];
  const map = {
    hokuto: ["ほくと", "北斗", "北斗の拳"],
    hokuto_tensei2: ["転生", "てんせい", "北斗転生2", "ほくとてんせい2"],
    tokyo_ghoul: ["とうきょうぐーる", "ぐーる", "グール"],
    sf5: ["すと5", "スト5", "streetfighter5"],
    monkeyv: ["モンキー", "monkey", "モンキーターン"],
    godeater: ["ごっどいーたー", "ge", "god eater"],
    goblin: ["ゴブスレ", "ごぶすれ"],
    valvrave2: ["vvv", "ヴヴヴ2", "v2"],
    kabaneri: ["かばねり", "甲鉄城"],
    kaguya: ["かぐや", "かぐやさま"],
    koukaku: ["こうかく", "攻殻"],
    tensura: ["てんすら"],
    tekken6: ["てっけん", "鉄拳"],
    chibaryo2: ["ちばりよ", "チバリヨ"],
    banchou4: ["ばんちょう4", "番長"],
    biohazard: ["ばいお", "バイオ"],
    dumbbell: ["だんべる"],
    baki: ["ばき"]
  };
  return [...base, ...(map[machine.slug] || [])].map(normalizeText).join("|");
}

(async function loadMachines(){
  const list = document.getElementById("machineList");
  const count = document.getElementById("machineCount");
  const heroCount = document.getElementById("heroCount");
  const search = document.getElementById("machineSearch");
  const empty = document.getElementById("machineEmpty");

  try {
    const res = await fetch("assets/data/machines.json");
    if (!res.ok) throw new Error("machines.json load failed");
    const machines = await res.json();
    const prepared = machines.map(machine => ({ ...machine, __keywords: buildKeywords(machine) }));

    function render(keyword = "") {
      const query = normalizeText(keyword);
      const filtered = prepared.filter(machine => !query || machine.__keywords.includes(query));
      count.textContent = filtered.length + "機種";
      heroCount.textContent = filtered.length + "機種";
      list.innerHTML = "";

      if (!filtered.length) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      filtered.forEach(machine => {
        const isReady = machine.strategy && machine.strategy !== "準備中";
        const row = document.createElement("article");
        row.className = "list-row";
        row.innerHTML = `
          <div class="machine-main">
            <h2 class="machine-name">${machine.name}</h2>
            <div class="machine-sub">
              <span class="slug-chip">${machine.slug}</span>
              <span class="status-chip ${isReady ? "status-ready" : "status-wip"}">${isReady ? "公開中" : "準備中"}</span>
              <span class="type-chip">${machine.info || "未設定"}</span>
            </div>
            <p class="machine-strategy">${machine.strategy || "狙い目未設定"}</p>
          </div>
          <div class="row-actions">
            <a class="btn-sub" href="machine.html?slug=${machine.slug}">記事</a>
            <a class="btn-main" href="checker.html?slug=${machine.slug}">チェッカー</a>
          </div>
        `;
        list.appendChild(row);
      });
    }

    search.addEventListener("input", event => render(event.target.value));
    render();
  } catch (error) {
    count.textContent = "エラー";
    heroCount.textContent = "エラー";
    empty.style.display = "block";
    empty.textContent = "機種一覧の読み込みに失敗しました。";
  }
})();
</script>
</body>
</html>
