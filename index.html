<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>狙い目手帖</title>
  <meta name="description" content="スロットの狙い目・やめどき・リセット情報を機種別に確認できる狙い目情報サイトです。">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="site-eyebrow">slot strategy archive</p>
      <h1 class="site-title">狙い目手帖</h1>
      <p class="site-lead">ホールでスマホを開いた瞬間に判断しやすいよう、<strong class="u-em">狙い目・やめどき・チェッカー</strong>を見やすく整理しています。</p>
    </div>
  </header>

  <main class="wrap">
    <section class="section-head">
      <div>
        <h2>掲載機種一覧</h2>
        <p><span class="u-line">先に記事を見るか、すぐにチェッカーへ進むか</span>を選べる構成です。スマホでも縦に追いやすいよう、情報はできるだけ短くまとめています。</p>
      </div>
    </section>
    <div id="machineGrid" class="machine-grid"></div>
  </main>

  <script>
    const formatStrategy = (text) => {
      if (!text) return '準備中';
      const rankClass = (mark) => ({ '◎': 'rank-mark rank-mark--excellent', '○': 'rank-mark rank-mark--ok', '△': 'rank-mark rank-mark--caution', '×': 'rank-mark rank-mark--ng' }[mark] || 'rank-mark');
      return text.replace(/[◎○△×]/g, mark => `<span class="${rankClass(mark)}">${mark}</span>`);
    };

    fetch('assets/data/machines.json')
      .then(r => r.json())
      .then(list => {
        const grid = document.getElementById('machineGrid');
        grid.innerHTML = '';
        list.forEach(machine => {
          const card = document.createElement('article');
          card.className = 'machine-card';
          card.innerHTML = `
            <div class="machine-card__body">
              <p class="machine-card__eyebrow">${machine.info || 'slot data'}</p>
              <h3 class="machine-card__title">${machine.name}</h3>
              <p class="machine-card__strategy">${formatStrategy('狙い目：' + (machine.strategy || '準備中'))}</p>
            </div>
            <div class="machine-card__actions">
              <a class="btn btn-main" href="machine.html?slug=${machine.slug}">記事を見る</a>
              <a class="btn btn-sub" href="checker.html?slug=${machine.slug}">チェッカー</a>
            </div>
          `;
          grid.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('machineGrid').innerHTML = '<p class="notice">機種データの読み込みに失敗しました。</p>';
      });
  </script>
</body>
</html>
