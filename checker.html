<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>狙い目チェッカー | 狙い目手帖</title>
  <meta name="description" content="現在のゲーム数から狙い目かどうかを簡易判定するチェッカーです。">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <div class="nav-backdrop" id="navBackdrop"></div>
  <nav class="site-nav" id="siteNav" aria-hidden="true">
    <button class="nav-close" id="navClose" aria-label="メニューを閉じる">×</button>
    <p class="nav-eyebrow">menu</p>
    <div class="nav-links">
      <a class="nav-link" href="./"><span>トップ</span><small>home</small></a>
      <a class="nav-link" id="navArticleLink" href="#"><span>記事ページ</span><small>article</small></a>
      <a class="nav-link" href="./contact.html"><span>お問い合わせ</span><small>contact</small></a>
      <a class="nav-link" href="./privacy.html"><span>プライバシーポリシー</span><small>policy</small></a>
    </div>
  </nav>

  <header class="page-header">
    <div class="wrap">
      <div class="header-top">
        <div class="brand-lockup">
          <a class="back-link" href="./">← 一覧に戻る</a>
          <p class="page-eyebrow">狙い目チェッカー</p>
          <h1 id="checkerTitle" class="page-title">読み込み中...</h1>
        </div>
        <div class="header-actions">
          <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く"><span></span></button>
        </div>
      </div>
      <p id="checkerSubtitle" class="page-strategy is-empty"></p>
    </div>
  </header>

  <main class="wrap checker-wrap checker-wrap--enhanced">
    <section class="checker-card checker-card--hero checker-card--minimal">
      <label class="field-label" for="currentGame">current game</label>
      <div class="checker-input-row">
        <div class="checker-state-switch" id="stateSwitch">
          <button type="button" class="state-btn is-active" data-state="normal">通常</button>
          <button type="button" class="state-btn" data-state="reset">リセット</button>
        </div>
        <input id="currentGame" class="input" type="number" min="0" step="1" inputmode="numeric" placeholder="ゲーム数を入力">
      </div>
      <div id="judgeResult" class="judge-panel judge-panel--muted">
        <div class="judge-mark">×</div>
        <div>
          <p class="judge-title">入力待ち</p>
          <p class="judge-reason"> </p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const slug = new URLSearchParams(location.search).get('slug');
    let checkerData = null;
    let currentState = 'normal';

    const setJudgeResult = (state, mark, title, reason = '') => {
      const result = document.getElementById('judgeResult');
      result.className = 'judge-panel ' + state;
      result.innerHTML = `
        <div class="judge-mark">${mark || '×'}</div>
        <div>
          <p class="judge-title">${title}</p>
          <p class="judge-reason">${reason}</p>
        </div>
      `;
    };

    const getThresholdConfig = () => {
      const normal = Number(checkerData?.gameThreshold || 0);
      const recommended = Number(checkerData?.recommendedThreshold || normal || 0);
      const caution = Number(checkerData?.cautionThreshold || Math.max(0, normal - 150));
      const reset = Number(checkerData?.resetThreshold || 0);
      if (currentState === 'reset') {
        if (reset > 0) {
          return {
            threshold: reset,
            recommended: Math.max(reset, reset + Math.max(50, Math.round((recommended - normal) || 50))),
            caution: Math.max(0, reset - 80)
          };
        }
        return { threshold: 0, recommended: 0, caution: 0 };
      }
      return { threshold: normal, recommended, caution };
    };

    const runJudge = () => {
      const raw = document.getElementById('currentGame').value.trim();
      if (!checkerData) {
        setJudgeResult('judge-panel--muted', '×', '読み込み中');
        return;
      }
      if (!raw) {
        setJudgeResult('judge-panel--muted', '×', '入力待ち');
        return;
      }
      const value = Number(raw);
      if (!Number.isFinite(value) || value < 0) {
        setJudgeResult('judge-panel--muted', '×', '入力エラー');
        return;
      }

      const config = getThresholdConfig();
      if (!config.threshold || config.threshold <= 0) {
        setJudgeResult('judge-panel--muted', '×', '判定対象外');
        return;
      }

      const diff = Math.max(0, config.threshold - value);
      if (value >= config.recommended) {
        setJudgeResult('judge-panel--excellent', '◎', '狙い目', '基準をしっかり超えています');
        return;
      }
      if (value >= config.threshold) {
        setJudgeResult('judge-panel--ok', '○', '候補', '基準ラインに到達しています');
        return;
      }
      if (value >= config.caution) {
        setJudgeResult('judge-panel--caution', '△', '様子見', 'あと' + diff + 'G');
        return;
      }
      setJudgeResult('judge-panel--ng', '×', '見送り', 'あと' + diff + 'G');
    };

    Promise.all([
      fetch('assets/data/machines.json').then(r => r.json()),
      fetch('assets/data/checkers/' + slug + '.json').then(r => r.json())
    ]).then(([machines, checker]) => {
      checkerData = checker;
      const machineData = machines.find(x => x.slug === slug);
      document.getElementById('checkerTitle').textContent = machineData ? machineData.name : 'チェッカー';
      document.title = (machineData ? machineData.name + ' ' : '') + '狙い目チェッカー | 狙い目手帖';
      document.getElementById('navArticleLink').href = machineData ? ('machine.html?slug=' + machineData.slug) : './';
      runJudge();
    }).catch(() => {
      document.getElementById('checkerTitle').textContent = '読み込みに失敗しました';
      setJudgeResult('judge-panel--muted', '×', '読み込み失敗');
    });

    document.getElementById('currentGame').addEventListener('input', runJudge);
    document.getElementById('stateSwitch').addEventListener('click', (event) => {
      const button = event.target.closest('.state-btn');
      if (!button) return;
      currentState = button.dataset.state || 'normal';
      document.querySelectorAll('.state-btn').forEach(btn => btn.classList.toggle('is-active', btn === button));
      runJudge();
    });

    const menuToggle = document.getElementById('menuToggle');
    const nav = document.getElementById('siteNav');
    const navBackdrop = document.getElementById('navBackdrop');
    const navClose = document.getElementById('navClose');
    const setMenu = (open) => {
      nav.classList.toggle('is-open', open);
      navBackdrop.classList.toggle('is-open', open);
      menuToggle.classList.toggle('is-open', open);
      nav.setAttribute('aria-hidden', open ? 'false' : 'true');
    };
    menuToggle.addEventListener('click', () => setMenu(!nav.classList.contains('is-open')));
    navClose.addEventListener('click', () => setMenu(false));
    navBackdrop.addEventListener('click', () => setMenu(false));
  </script>
</body>
</html>
