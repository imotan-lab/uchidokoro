<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>狙い目チェッカー | 狙い目手帖</title>
  <meta name="description" content="現在のゲーム数から狙い目かどうかを簡易判定するチェッカーです。">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="page-header">
    <div class="wrap">
      <a class="back-link" href="./">← 一覧に戻る</a>
      <p class="page-eyebrow">狙い目チェッカー</p>
      <h1 id="checkerTitle" class="page-title">読み込み中...</h1>
      <p class="page-strategy">現在のゲーム数を入力して、ホールで見ながらすぐ判定できます。</p>
    </div>
  </header>

  <main class="wrap checker-wrap checker-wrap--enhanced">
    <section class="checker-card checker-card--hero checker-card--minimal">
      <div class="checker-card__intro">
        <div>
          <p class="section-kicker">quick checker</p>
          <h2>現在のゲーム数で即判定</h2>
        </div>
      </div>
      <p id="checkerCatch" class="checker-simple-note">G数を入れると自動で判定します。</p>
      <div class="checker-state-switch" id="stateSwitch">
        <button type="button" class="state-btn is-active" data-state="unknown">朝イチ不明</button>
        <button type="button" class="state-btn" data-state="reset">朝イチリセット台</button>
        <button type="button" class="state-btn" data-state="held">据え置き</button>
      </div>
      <p id="stateHelp" class="checker-state-help">不明なら安全側で判定します。</p>
      <label class="field-label" for="currentGame">現在のゲーム数</label>
      <div class="checker-form checker-form--stack-mobile">
        <input id="currentGame" class="input" type="number" min="0" step="1" inputmode="numeric" placeholder="例：620">
      </div>
      <div id="judgeResult" class="judge-panel judge-panel--muted">
        <div class="judge-mark">-</div>
        <div>
          <p class="judge-title">ゲーム数を入力してください。</p>
          <p class="judge-reason">入力すると自動で判定します。</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const slug = new URLSearchParams(location.search).get('slug');
    let checkerData = null;
    let currentState = 'unknown';
    const rankMarkup = (mark) => {
      const classes = { '◎': 'rank-mark rank-mark--excellent', '○': 'rank-mark rank-mark--ok', '△': 'rank-mark rank-mark--caution', '×': 'rank-mark rank-mark--ng' };
      return '<span class="' + (classes[mark] || 'rank-mark') + '">' + mark + '</span>';
    };

    const setJudgeResult = (state, mark, title, reason) => {
      const result = document.getElementById('judgeResult');
      result.className = 'judge-panel ' + state;
      result.innerHTML = `
        <div class="judge-mark">${mark ? rankMarkup(mark) : '-'}</div>
        <div>
          <p class="judge-title">${title}</p>
          <p class="judge-reason">${reason}</p>
        </div>
      `;
    };

    Promise.all([
      fetch('assets/data/machines.json').then(r => r.json()),
      fetch('assets/data/checkers/' + slug + '.json').then(r => r.json())
    ]).then(([machines, checker]) => {
      checkerData = checker;
      const machineData = machines.find(x => x.slug === slug);

      document.getElementById('checkerTitle').textContent = machineData ? machineData.name : 'チェッカー';
      document.title = (machineData ? machineData.name + ' ' : '') + '狙い目チェッカー | 狙い目手帖';
      document.getElementById('checkerCatch').textContent = checker.catchCopy || 'G数を入れると自動で判定します。';
    }).catch(() => {
      document.getElementById('checkerTitle').textContent = '読み込みに失敗しました';
      setJudgeResult('judge-panel--muted', '-', 'チェッカーデータの読み込みに失敗しました。', '時間を置いて再度お試しください。');
    });

    const getThresholdConfig = () => {
      const normal = Number(checkerData?.gameThreshold || 0);
      const recommended = Number(checkerData?.recommendedThreshold || normal || 0);
      const caution = Number(checkerData?.cautionThreshold || Math.max(0, normal - 150));
      const reset = Number(checkerData?.resetThreshold || 0);

      if (currentState === 'reset') {
        if (reset > 0) {
          return {
            threshold: reset,
            recommended: Math.max(reset, reset + Math.max(50, Math.round((recommended - normal) || 50))),
            caution: Math.max(0, reset - 80),
            title: '朝イチリセット台として判定',
            help: 'リセット前提の基準で見ます。'
          };
        }
        return {
          threshold: 0,
          recommended: 0,
          caution: 0,
          title: '朝イチリセット台として判定',
          help: checkerData?.resetLabel || 'この機種はリセット時の固定狙い目がありません。'
        };
      }

      if (currentState === 'held') {
        return {
          threshold: normal,
          recommended,
          caution,
          title: '据え置きとして判定',
          help: '通常時の基準で見ます。'
        };
      }

      return {
        threshold: normal,
        recommended,
        caution,
        title: '朝イチ不明として判定',
        help: '不明なら安全側で通常時基準を優先します。'
      };
    };

    const runJudge = () => {
      const input = document.getElementById('currentGame');
      const raw = input.value.trim();
      const help = document.getElementById('stateHelp');

      if (!checkerData) {
        setJudgeResult('judge-panel--muted', '', 'データ読み込み後に自動判定します。', '通信完了まで少しお待ちください。');
        return;
      }

      const config = getThresholdConfig();
      help.textContent = config.help;

      if (!raw) {
        setJudgeResult('judge-panel--muted', '', config.title, 'ゲーム数を入力すると自動で判定します。');
        return;
      }

      const value = Number(raw);
      if (!Number.isFinite(value) || value < 0) {
        setJudgeResult('judge-panel--muted', '', '入力値を確認してください。', '0以上の数字で入力してください。');
        return;
      }

      if (!config.threshold || config.threshold <= 0) {
        setJudgeResult('judge-panel--muted', '', config.title, config.help);
        return;
      }

      const diff = Math.max(0, config.threshold - value);
      if (value >= config.recommended) {
        setJudgeResult('judge-panel--excellent', '◎', 'かなり狙いやすいです。', '基準をしっかり超えているため、優先度は高めです。');
        return;
      }
      if (value >= config.threshold) {
        setJudgeResult('judge-panel--ok', '○', '狙い目ラインです。', 'この条件なら候補として見やすい水準です。');
        return;
      }
      if (value >= config.caution) {
        setJudgeResult('judge-panel--caution', '△', 'あと少しです。', '基準まであと' + diff + 'Gです。');
        return;
      }
      setJudgeResult('judge-panel--ng', '×', 'まだ浅めです。', '基準まであと' + diff + 'Gあるため、基本は見送りです。');
    };

    document.getElementById('currentGame').addEventListener('input', runJudge);
    document.getElementById('stateSwitch').addEventListener('click', (event) => {
      const button = event.target.closest('.state-btn');
      if (!button) return;
      currentState = button.dataset.state || 'unknown';
      document.querySelectorAll('.state-btn').forEach(btn => btn.classList.toggle('is-active', btn === button));
      runJudge();
    });

  </script>
</body>
</html>
