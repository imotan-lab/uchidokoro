<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チェッカー | うちどころ。</title>
<meta name="description" content="通常時・リセット後のG数を入力して狙い目を即判定します。">
<link rel="stylesheet" href="assets/css/practical.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html"><img src="assets/img/logo.png" alt="うちどころ。" style="height:36px;width:auto;display:block;"></a>
    <nav class="nav-links">
      <a id="articleLinkNav" href="machine.html">記事</a>
      <a href="index.html">機種一覧</a>
    </nav>
  </div>
</header>
<main class="site-main">
  <section class="hero-panel">
    <h1 id="checkerTitle" class="page-title">チェッカー</h1>
  </section>

  <section class="section-stack">
    <article class="checker-card">
      <div class="control-grid">
        <div>
          <div class="mode-toggle">
            <input id="modeNormal" name="mode" type="radio" value="normal" checked>
            <label for="modeNormal">通常</label>
            <input id="modeReset" name="mode" type="radio" value="reset">
            <label for="modeReset">リセット</label>
          </div>
        </div>
        <div class="control-row">
          <div>
            <label class="visually-hidden" for="game">現在G数</label>
            <input id="game" class="game-input" inputmode="numeric" type="number" placeholder="現在G数">
          </div>
        </div>
        <p id="hintText" class="hint-text">データが通常 / リセット別に未設定の機種は、共通基準で判定します。</p>
      </div>
    </article>

    <article id="resultCard" class="result-card">
      <div class="result-top">
        <p id="resultTitle" class="result-title">判定待ち</p>
        <div id="resultBadge" class="result-badge result-mid">△</div>
      </div>
      <p id="resultCopy" class="result-copy">入力中に自動で判定します。</p>
      <p id="resultNote" class="result-note">最終判断は液晶・示唆・当日状況を優先してください。</p>
    </article>

    <article class="surface-card">
      <h2 class="section-title">移動</h2>
      <div class="action-stack">
        <a id="articleLinkCard" class="btn-sub" href="machine.html">記事を見る</a>
        <a class="btn-main" href="index.html">一覧へ戻る</a>
      </div>
    </article>
  </section>
</main>

<footer>
  <div class="site-footer-inner">© 2026 うちどころ。</div>
</footer>

<script>
function readModeConfig(machine, mode){
  const checker = machine.checker || {};
  if (checker[mode] && typeof checker[mode] === "object") return checker[mode];
  return checker;
}

function thresholdText(config, unit){
  if (!config || (!Number.isFinite(config.caution) && !Number.isFinite(config.target))) return "準備中";
  if (Number.isFinite(config.excellent) && Number.isFinite(config.good) && Number.isFinite(config.caution)) {
    return `${config.caution}${unit}〜 △ / ${config.good}${unit}〜 ◯ / ${config.excellent}${unit}〜 ◎`;
  }
  if (Number.isFinite(config.target)) return `${config.target}${unit}〜`;
  return "準備中";
}

function evaluate(game, config, unit){
  if (!config || (!Number.isFinite(config.caution) && !Number.isFinite(config.target))) {
    return { symbol:"△", title:"準備中", copy:"この機種はまだ詳細設定前です。", className:"result-mid" };
  }
  if (!Number.isFinite(game) || game < 0) {
    return { symbol:"△", title:"入力待ち", copy:`現在${unit === "G" ? "G数" : unit}を正しく入力してください。`, className:"result-mid" };
  }
  if (Number.isFinite(config.excellent) && game >= config.excellent) {
    return { symbol:"◎", title:"優先して確認", copy:`${config.excellent}${unit}以上です。かなり打ちやすいラインです。`, className:"result-ok" };
  }
  if (Number.isFinite(config.good) && game >= config.good) {
    return { symbol:"◯", title:"狙い目", copy:`${config.good}${unit}以上です。候補として見られます。`, className:"result-ok" };
  }
  const caution = Number.isFinite(config.caution) ? config.caution : config.target;
  if (Number.isFinite(caution) && game >= caution) {
    return { symbol:"△", title:"条件次第", copy:`${caution}${unit}以上です。交換率や状況しだいで候補です。`, className:"result-caution" };
  }
  return { symbol:"×", title:"まだ早い", copy:`現状は${caution}${unit}以上を目安にしてください。`, className:"result-ng" };
}

(function(){
  const params = new URLSearchParams(location.search);
  const slug = params.get("slug");
  const titleEl = document.getElementById("checkerTitle");
  const articleLinkNav = document.getElementById("articleLinkNav");
  const articleLinkCard = document.getElementById("articleLinkCard");
  const resultTitle = document.getElementById("resultTitle");
  const resultBadge = document.getElementById("resultBadge");
  const resultCopy = document.getElementById("resultCopy");
  const resultNote = document.getElementById("resultNote");
  const gameInput = document.getElementById("game");
  const hintText = document.getElementById("hintText");
  let currentMachine = null;

  function applyResult(result){
    resultTitle.textContent = result.title;
    resultCopy.textContent = result.copy;
    resultBadge.textContent = result.symbol;
    resultBadge.className = "result-badge " + result.className;
  }

  function currentMode(){
    return document.querySelector('input[name="mode"]:checked').value;
  }

  function judge(){
    if (!currentMachine) return;
    const mode = currentMode();
    const checker = currentMachine.checker || {};
    const unit = checker.unit || "G";
    const config = readModeConfig(currentMachine, mode);
    const game = Number(gameInput.value);
    applyResult(evaluate(game, config, unit));
    resultNote.textContent = config.note || "最終判断は液晶・示唆・当日状況を優先してください。";
    hintText.textContent = config.note || "データが通常 / リセット別に未設定の機種は、共通基準で判定します。";
  }

  fetch("assets/data/machines.json")
    .then(res => { if (!res.ok) throw new Error("load failed"); return res.json(); })
    .then(machines => {
      currentMachine = machines.find(machine => machine.slug === slug);
      if (!currentMachine) throw new Error("not found");

      const articleHref = "machine.html?slug=" + currentMachine.slug;
      articleLinkNav.href = articleHref;
      articleLinkCard.href = articleHref;
      document.title = currentMachine.name + " チェッカー | うちどころ。";
      titleEl.textContent = currentMachine.name + " チェッカー";

      const checker = currentMachine.checker || {};
      const normalConfig = readModeConfig(currentMachine, "normal");
      const resetConfig = readModeConfig(currentMachine, "reset");
      hintText.textContent = `通常: ${thresholdText(normalConfig, "G")} / リセット: ${thresholdText(resetConfig, "G")}`;

      judge();
    })
    .catch(() => {
      titleEl.textContent = "機種が見つかりません";
      hintText.textContent = "-";
      applyResult({ symbol:"×", title:"エラー", copy:"機種データを読み込めませんでした。", className:"result-ng" });
      gameInput.disabled = true;
    });

  gameInput.addEventListener("input", judge);
  gameInput.addEventListener("keydown", event => { if (event.key === "Enter") judge(); });
  document.querySelectorAll('input[name="mode"]').forEach(input => input.addEventListener("change", judge));
})();
</script>
</body>
</html>
