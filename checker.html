<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チェッカー | うちどころ。</title>
<meta name="description" content="通常時・リセット後のG数を入力して狙い目を即判定します。">
<link rel="stylesheet" href="assets/css/practical.css">
<link rel="manifest" href="/uchidokoro/manifest.json">
<meta name="theme-color" content="#07090c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="うちどころ。">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html"><img src="assets/img/logo.png" alt="うちどころ。" style="height:36px;width:auto;display:block;"></a>
    <div class="header-search-wrap">
      <span class="header-search-icon">🔍</span>
      <input id="headerSearch" class="header-search-input" type="search" placeholder="機種を検索">
      <div id="headerDropdown" class="header-dropdown"></div>
    </div>
    <nav style="flex-shrink:0;">
      <a id="articleLinkNav" href="machine.html" style="color:var(--muted);font-size:13px;font-weight:700;">記事</a>
    </nav>
  </div>
</header>
<main class="site-main">

  <section class="article-hero">
    <p class="eyebrow"><a href="index.html" style="color:var(--muted);text-decoration:none;">‹ 一覧</a>&nbsp;&nbsp;CHECKER</p>
    <h1 id="checkerTitle" class="page-title">チェッカー</h1>
  </section>

  <section class="article-section-wrap">

    <div class="article-block">
      <p class="block-label">▶ 狙い目チェッカー</p>
      <div class="checker-card">
        <div id="rateToggle" class="mode-toggle" style="display:none;margin-bottom:10px;"></div>
        <div id="modeToggle" class="mode-toggle"></div>
        <div id="suruWrap" style="display:none;margin-bottom:10px;">
          <p style="font-size:12px;color:var(--muted);margin-bottom:6px;">CZスルー回数</p>
          <div class="setting-counter-wrap">
            <button class="setting-cnt-btn" id="suruDec">－</button>
            <span id="suruVal" style="min-width:40px;text-align:center;font-size:20px;font-weight:700;color:var(--gold);">0</span>
            <button class="setting-cnt-btn" id="suruInc">＋</button>
          </div>
        </div>
        <label class="visually-hidden" for="game">現在G数</label>
        <input id="game" class="game-input" inputmode="numeric" type="number" placeholder="現在G数を入力">
        <div id="checkerResult" class="checker-result result-wait">
          <p class="result-label">判定</p>
          <p class="result-text">G数を入力してください</p>
        </div>
        <p id="hintText" class="hint-text"></p>
      </div>
    </div>

    <div class="article-block">
      <p class="block-label">▶ 移動</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <a id="articleLinkCard" class="btn-show-all" href="machine.html" style="text-align:center;">記事を見る</a>
        <a href="index.html" class="btn-show-all" style="text-align:center;color:var(--muted);">一覧へ戻る</a>
      </div>
    </div>

  </section>

</main>

<footer>
  <div class="site-footer-inner">
    <div class="footer-links">
      <a href="contact.html">お問い合わせ</a>
      <a href="privacy.html">プライバシーポリシー</a>
    </div>
    <p class="footer-copy">© 2026 うちどころ。</p>
  </div>
</footer>

<script>
(function(){
  function normalizeText(value){
    return String(value || "")
      .toLowerCase()
      .replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
      .replace(/[\s\-\_ー]/g, "");
  }
  const searchInput = document.getElementById("headerSearch");
  const dropdown = document.getElementById("headerDropdown");
  let allMachines = [];
  fetch("assets/data/machines.json").then(r => r.json()).then(m => { allMachines = m; });
  searchInput.addEventListener("input", function(){
    const query = normalizeText(this.value);
    dropdown.innerHTML = "";
    if (!query) { dropdown.style.display = "none"; return; }
    const matched = allMachines.filter(m => {
      return [m.name, m.slug, ...(m.aliases||[])].map(normalizeText).join("|").includes(query);
    }).slice(0, 6);
    if (!matched.length) { dropdown.style.display = "none"; return; }
    matched.forEach(m => {
      const a = document.createElement("a");
      a.className = "header-dropdown-item";
      a.href = "checker.html?slug=" + m.slug;
      a.textContent = m.name;
      dropdown.appendChild(a);
    });
    dropdown.style.display = "block";
  });
  document.addEventListener("click", e => { if (!e.target.closest(".header-search-wrap")) dropdown.style.display = "none"; });
})();

// モード設定を取得（hasSuru対応・後方互換あり）
function getModes(checker) {
  if (checker.modes) return checker.modes;
  const modes = [];
  if (checker.normal) modes.push({ key: "normal", label: "通常" });
  if (checker.reset)  modes.push({ key: "reset",  label: "リセット" });
  if (!modes.length)  modes.push({ key: "normal", label: "通常" });
  return modes;
}

// モード + スルー回数からconfigを取得
function getConfig(checker, modeKey, suruCount) {
  const modeData = checker[modeKey];
  if (!modeData) return checker; // 旧形式フォールバック
  if (modeData.suru && Array.isArray(modeData.suru)) {
    const list = modeData.suru;
    const max = list[list.length - 1].count;
    const idx = Math.min(suruCount, max);
    return list.find(s => s.count === idx) || list[list.length - 1];
  }
  return modeData;
}

function resolveRateConfig(config, rateKey) {
  if (!config) return config;
  if (config.byRate && rateKey && config.byRate[rateKey]) {
    return { ...config, ...config.byRate[rateKey] };
  }
  return config;
}

function evaluate(game, config) {
  if (!config || (!Number.isFinite(config.good) && !Number.isFinite(config.target))) {
    return { cls: "result-wait", text: "準備中" };
  }
  if (!Number.isFinite(game) || game < 0) {
    return { cls: "result-wait", text: "G数を入力してください" };
  }
  if (Number.isFinite(config.excellent) && game >= config.excellent) {
    return { cls: "result-ok", text: "◎ 狙い目OK！積極的に着席を検討" };
  }
  if (Number.isFinite(config.good) && game >= config.good) {
    return { cls: "result-ok", text: "◯ 狙い目OK　交換率次第で候補" };
  }
  const t = Number.isFinite(config.caution) ? config.caution : (config.target || config.good);
  if (Number.isFinite(t) && game >= t) {
    return { cls: "result-wait", text: `△ 条件次第　${t}G以上で候補` };
  }
  const thr = Number.isFinite(config.good) ? config.good : t;
  return { cls: "result-ng", text: `× まだ早い　${thr}G以上を目安に` };
}

(function () {
  const slug = new URLSearchParams(location.search).get("slug");
  const titleEl = document.getElementById("checkerTitle");
  const articleLinkNav = document.getElementById("articleLinkNav");
  const articleLinkCard = document.getElementById("articleLinkCard");
  const checkerResult = document.getElementById("checkerResult");
  const gameInput = document.getElementById("game");
  const hintText = document.getElementById("hintText");
  const modeToggle = document.getElementById("modeToggle");
  const rateToggle = document.getElementById("rateToggle");
  const suruWrap = document.getElementById("suruWrap");
  const suruVal = document.getElementById("suruVal");
  const checkerCard = document.querySelector(".checker-card");
  let currentMachine = null;
  let suruCount = 0;
  let currentRateKey = null;

  function getRateOptions(checker) {
    return Array.isArray(checker.exchangeRates) ? checker.exchangeRates : [];
  }

  function getCurrentRateKey() {
    const checked = document.querySelector('input[name="exchangeRate"]:checked');
    return checked ? checked.value : currentRateKey;
  }

  document.getElementById("suruInc").addEventListener("click", () => {
    const checker = currentMachine ? (currentMachine.checker || {}) : {};
    const modeKey = getCurrentMode();
    const suruMax = checker[modeKey] && Number.isFinite(checker[modeKey].suruMax) ? checker[modeKey].suruMax : 99;
    suruCount = Math.min(suruMax, suruCount + 1);
    suruVal.textContent = suruCount;
    judge();
  });
  document.getElementById("suruDec").addEventListener("click", () => {
    suruCount = Math.max(0, suruCount - 1);
    suruVal.textContent = suruCount;
    judge();
  });

  function applyResult(r) {
    checkerResult.className = "checker-result " + r.cls;
    checkerResult.querySelector(".result-text").textContent = r.text;
  }

  function getCurrentMode() {
    const checked = document.querySelector('input[name="mode"]:checked');
    return checked ? checked.value : null;
  }

  function getMachineLimit(modeKey) {
    const checker = currentMachine ? (currentMachine.checker || {}) : {};
    if (currentMachine && Number.isFinite(currentMachine.limit)) return currentMachine.limit;
    if (currentMachine && currentMachine.limit && typeof currentMachine.limit === "object" && Number.isFinite(currentMachine.limit[modeKey])) return currentMachine.limit[modeKey];
    if (Number.isFinite(checker.limit)) return checker.limit;
    if (checker[modeKey] && Number.isFinite(checker[modeKey].limit)) return checker[modeKey].limit;
    return null;
  }

  function applyInputLimit(modeKey) {
    const limit = getMachineLimit(modeKey);
    if (Number.isFinite(limit)) {
      gameInput.max = String(limit);
      gameInput.placeholder = `現在G数を入力（最大${limit}G）`;
      const current = parseInt(gameInput.value, 10);
      if (!Number.isNaN(current) && current > limit) gameInput.value = String(limit);
    } else {
      gameInput.removeAttribute("max");
      gameInput.placeholder = "現在G数を入力";
    }
  }

  function judge() {
    if (!currentMachine) return;
    const checker = currentMachine.checker || {};
    const modeKey = getCurrentMode();
    if (!modeKey) return;
    const modedef = (checker.modes || []).find(m => m.key === modeKey);
    suruWrap.style.display = (modedef && modedef.hasSuru) ? "block" : "none";
    const config = resolveRateConfig(getConfig(checker, modeKey, suruCount), getCurrentRateKey());
    applyResult(evaluate(Number(gameInput.value), config));
    hintText.textContent = config.note || "";
  }

  function buildModes(machine) {
    const checker = machine.checker || {};
    const modes = getModes(checker);
    modeToggle.innerHTML = "";
    modes.forEach((mode, i) => {
      const id = "mode_" + mode.key;
      const input = document.createElement("input");
      input.type = "radio";
      input.name = "mode";
      input.id = id;
      input.value = mode.key;
      if (i === 0) input.checked = true;
      const label = document.createElement("label");
      label.htmlFor = id;
      label.textContent = mode.label;
      input.addEventListener("change", () => {
        suruCount = 0;
        suruVal.textContent = 0;
        gameInput.value = "";
        applyInputLimit(mode.key);
        judge();
      });
      modeToggle.appendChild(input);
      modeToggle.appendChild(label);
    });
  }

  function buildRateOptions(machine) {
    const checker = machine.checker || {};
    const rates = getRateOptions(checker);
    rateToggle.innerHTML = "";
    if (!rates.length) {
      rateToggle.style.display = "none";
      currentRateKey = null;
      return;
    }

    rateToggle.style.display = "grid";
    rates.forEach((rate, i) => {
      const id = "rate_" + rate.key;
      const input = document.createElement("input");
      input.type = "radio";
      input.name = "exchangeRate";
      input.id = id;
      input.value = rate.key;
      if (rate.key === checker.defaultRate || (!checker.defaultRate && i === 0)) {
        input.checked = true;
        currentRateKey = rate.key;
      }

      const label = document.createElement("label");
      label.htmlFor = id;
      label.textContent = rate.label;

      input.addEventListener("change", () => {
        currentRateKey = rate.key;
        judge();
      });

      rateToggle.appendChild(input);
      rateToggle.appendChild(label);
    });
  }

  fetch("assets/data/machines.json")
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(machines => {
      currentMachine = machines.find(m => m.slug === slug);
      if (!currentMachine) throw new Error();
      const href = "machine.html?slug=" + currentMachine.slug;
      articleLinkNav.href = href;
      articleLinkCard.href = href;
      document.title = currentMachine.name + " チェッカー | うちどころ。";
      titleEl.textContent = currentMachine.name + " チェッカー";

      if (currentMachine.slug === "sf5") {
        checkerCard.classList.add("checker-card--guide");
        modeToggle.classList.add("is-hidden");
        rateToggle.classList.add("is-hidden");
        suruWrap.classList.add("is-hidden");
        gameInput.classList.add("is-hidden");
        checkerResult.className = "checker-result result-wait";
        checkerResult.classList.add("checker-result--guide");
        hintText.classList.add("hint-text--guide");
        checkerResult.querySelector(".result-label").textContent = "案内";
        checkerResult.querySelector(".result-text").textContent = "ゲーム数狙いには向きません。";
        hintText.textContent = "設定狙い向けの機種です。高設定をつかめる環境（イベント・特定日）での使用を推奨します。";
        return;
      }

      buildRateOptions(currentMachine);
      buildModes(currentMachine);
      applyInputLimit(getCurrentMode() || "normal");
      judge();
    })
    .catch(() => {
      titleEl.textContent = "機種が見つかりません";
      applyResult({ cls: "result-ng", text: "機種データを読み込めませんでした。" });
      gameInput.disabled = true;
    });

  gameInput.addEventListener("input", () => {
    const modeKey = getCurrentMode() || "normal";
    const limit = getMachineLimit(modeKey);
    if (Number.isFinite(limit)) {
      const value = parseInt(gameInput.value, 10);
      if (!Number.isNaN(value) && value > limit) gameInput.value = String(limit);
    }
    judge();
  });
  gameInput.addEventListener("blur", () => {
    const modeKey = getCurrentMode() || "normal";
    const limit = getMachineLimit(modeKey);
    const value = parseInt(gameInput.value, 10);
    if (Number.isFinite(limit) && !Number.isNaN(value) && value > limit) {
      gameInput.value = String(limit);
    }
    judge();
  });
  gameInput.addEventListener("keydown", e => { if (e.key === "Enter") judge(); });
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/uchidokoro/service-worker.js")
      .catch(err => console.warn("SW登録失敗:", err));
  });
}
</script>
</body>
</html>
