<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機種ページ | 狙い目手帖</title>
<meta name="description" content="機種ごとの狙い目記事ページです。結論と要点をスマホ向けに表示します。">
<link rel="stylesheet" href="assets/css/practical.css">
<script src="meta-auto.js"></script>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">狙い目手帖</a>
    <nav class="nav-links">
      <a href="index.html">機種一覧</a>
      <a id="checkerLinkNav" href="checker.html">チェッカー</a>
    </nav>
  </div>
</header>

<main class="site-main">
  <section class="hero-panel">
    <p class="eyebrow">ARTICLE</p>
    <h1 id="machineTitle" class="page-title">機種名</h1>
    <p id="heroSub" class="hero-sub">結論を先に確認できます。</p>
    <div class="hero-meta">
      <div class="meta-chip"><span class="meta-label">狙い目</span><span id="heroStrategy" class="meta-value">読込中</span></div>
      <div class="meta-chip"><span class="meta-label">タイプ</span><span id="heroType" class="meta-value">読込中</span></div>
      <div class="meta-chip"><span class="meta-label">判定</span><span class="meta-value">チェッカーあり</span></div>
    </div>
  </section>

  <section class="section-stack">
    <article class="top-cta-bar">
      <p class="top-cta-copy"><strong>まずはチェッカーで即判定</strong>空き台の現在あべし数が分かるなら、記事を読む前にそのまま判定できます。</p>
      <a class="btn-main" id="checkerLinkTop" href="checker.html">今すぐ判定</a>
    </article>

    <article class="surface-card table-card compact-table">
      <h2 class="section-title">要点</h2>
      <div id="quickGrid" class="quick-grid"></div>
    </article>

    <article class="surface-card table-card">
      <h2 class="section-title">基本情報</h2>
      <table class="info-table">
        <tbody id="summaryBody"></tbody>
      </table>
    </article>

    <article id="zoneCard" class="surface-card table-card">
      <h2 class="section-title">狙い目ゾーン</h2>
      <div class="zone-table">
        <div id="zoneRows"></div>
      </div>
    </article>

    <article class="surface-card article-block">
      <h2 class="section-title">本文</h2>
      <div id="articleSections" class="article-sections"></div>
    </article>

    <article class="surface-card">
      <h2 class="section-title">情報確認元</h2>
      <p id="sourceText" class="source-text">-</p>
    </article>

    <article class="surface-card">
      <h2 class="section-title">移動</h2>
      <div class="action-stack">
        <a class="btn-main" id="checkerLinkCard" href="checker.html">チェッカーを開く</a>
        <a class="btn-sub" href="index.html">一覧へ戻る</a>
      </div>
    </article>
  </section>
</main>

<footer>
  <div class="site-footer-inner">© 2026 狙い目手帖</div>
</footer>

<script>
(async () => {
  const slug = new URLSearchParams(location.search).get("slug");
  const quickGrid = document.getElementById("quickGrid");
  const summaryBody = document.getElementById("summaryBody");
  const articleSections = document.getElementById("articleSections");
  const zoneRowsWrap = document.getElementById("zoneRows");
  const zoneCard = document.getElementById("zoneCard");

  try {
    const res = await fetch("assets/data/machines.json");
    if (!res.ok) throw new Error("load failed");
    const machines = await res.json();
    const machine = machines.find(m => m.slug === slug);
    if (!machine) {
      document.body.innerHTML = '<div class="simple-center"><div class="simple-box"><h1>機種が見つかりません</h1><p>一覧から選び直してください。</p><p><a class="btn-main" href="index.html">機種一覧へ戻る</a></p></div></div>';
      return;
    }

    const article = machine.article || {};
    const strategy = machine.strategy || "準備中";
    const info = machine.info || "未設定";
    const href = "checker.html?slug=" + machine.slug;

    document.title = ((machine.seo && machine.seo.title) || machine.name) + " | 狙い目手帖";
    document.getElementById("machineTitle").textContent = machine.name;
    document.getElementById("heroSub").textContent = article.lead || (strategy === "準備中" ? "この機種は現在調整中です。" : "記事より先に結論とチェッカー導線を確認できます。");
    document.getElementById("heroStrategy").textContent = strategy;
    document.getElementById("heroType").textContent = info;

    const quickItems = (article.quick && article.quick.length) ? article.quick : [
      { label: "狙い目", value: strategy },
      { label: "タイプ", value: info }
    ];
    quickGrid.innerHTML = quickItems.map(item => `
      <div class="quick-card">
        <span class="quick-label">${item.label}</span>
        <span class="quick-value">${item.value}</span>
      </div>
    `).join("");

    const summaryRows = (article.summaryRows && article.summaryRows.length) ? article.summaryRows : [
      ["機種名", machine.name],
      ["タイプ", info],
      ["狙い目", strategy]
    ];
    summaryBody.innerHTML = summaryRows.map(row => `<tr><th>${row[0]}</th><td>${row[1]}</td></tr>`).join("");

    if (article.zoneRows && article.zoneRows.length) {
      zoneRowsWrap.innerHTML = article.zoneRows.map(row => `
        <div class="zone-row">
          <div class="zone-cell zone-range">${row[0]}</div>
          <div class="zone-cell"><span class="zone-badge zone-${row[1]}">${row[1]}</span></div>
          <div class="zone-cell zone-memo">${row[2]}</div>
        </div>
      `).join("");
    } else {
      zoneCard.style.display = "none";
    }

    const sections = (article.sections && article.sections.length) ? article.sections : [
      { title: "結論", body: strategy }
    ];
    articleSections.innerHTML = sections.map(section => `
      <section class="article-section">
        <h3>${section.title}</h3>
        <p>${section.body}</p>
      </section>
    `).join("");

    document.getElementById("sourceText").textContent = (article.sources || ["内部データ"]).join(" / ");
    document.getElementById("checkerLinkNav").href = href;
    document.getElementById("checkerLinkTop").href = href;
    document.getElementById("checkerLinkCard").href = href;
  } catch (error) {
    document.body.innerHTML = '<div class="simple-center"><div class="simple-box"><h1>読み込み失敗</h1><p>データの取得に失敗しました。</p><p><a class="btn-main" href="index.html">機種一覧へ戻る</a></p></div></div>';
  }
})();
</script>
</body>
</html>
