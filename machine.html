<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>機種ページ</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <main class="wrap">
    <h1 id="title"></h1>
    <div id="content" class="content"></div>
  </main>
<script>
const slug = new URLSearchParams(location.search).get('slug');

fetch('assets/data/machines.json').then(r=>r.json()).then(list=>{
  const m = list.find(x=>x.slug===slug);
  if(m){ document.getElementById('title').textContent = m.name; }
});

fetch('assets/data/machine-details/'+slug+'.json').then(r=>r.json()).then(d=>{
  const el = document.getElementById('content');
  el.innerHTML = `
    <h2>概要</h2><p>${d.overview}</p>
    <h2>天井</h2><p>${d.tenjo}</p>
    <h2>狙い目</h2><p>${d.strategy}</p>
    <h2>やめどき</h2><p>${d.yametoki}</p>
    <h2>リセット</h2><p>${d.reset}</p>
    <h2>注意点</h2><p>${d.caution}</p>`;
});
</script>
</body>
</html>
