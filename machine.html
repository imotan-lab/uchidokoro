<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>機種ページ</title><style>:root{--bg:#0d0d0f;--panel:#17171a;--panel2:#1e1f23;--line:#34353a;--gold:#c9a13d;--gold2:#e5c56e;--text:#f3efe4;--muted:#c9c0ae}*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:radial-gradient(circle at top, rgba(201,161,61,.12), transparent 25%),linear-gradient(180deg,#09090a 0%, #121316 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}a{text-decoration:none}.site-wrap{width:min(1100px, calc(100% - 32px)); margin:0 auto}.site-header{background:rgba(8,8,9,.95); border-bottom:1px solid rgba(201,161,61,.35); position:sticky; top:0; z-index:10}.header-inner{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 0}.brand{font-size:30px; font-weight:800; color:var(--gold2)}.nav-links{display:flex; gap:18px; flex-wrap:wrap}.nav-links a{color:var(--text); font-weight:700}.page-main{padding:36px 0 56px}.hero{margin-bottom:24px; padding:28px; border:1px solid rgba(201,161,61,.2); border-radius:20px; background:linear-gradient(180deg, rgba(201,161,61,.08), rgba(201,161,61,.02))}.eyebrow{margin:0 0 10px; font-size:12px; letter-spacing:.18em; font-weight:800; color:var(--gold2)}.page-title{margin:0; font-size:52px; line-height:1.15; color:#fff8e6}.cards{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:24px}.card{background:linear-gradient(180deg, var(--panel), var(--panel2)); border:1px solid var(--line); border-radius:20px; padding:28px; box-shadow:0 14px 36px rgba(0,0,0,.28)}.section-title{margin:0 0 18px; padding-left:12px; border-left:5px solid var(--gold); font-size:28px; color:var(--gold2)}.body-large{font-size:24px; font-weight:700; white-space:pre-wrap; line-height:1.6}.body-text{font-size:18px; line-height:1.9; color:var(--text); white-space:pre-wrap}.action-row{margin-top:24px}.btn-primary,.btn-sub{display:inline-flex; align-items:center; justify-content:center; min-height:54px; padding:0 24px; border:none; border-radius:999px; font-size:18px; font-weight:900; cursor:pointer}.btn-primary{background:linear-gradient(180deg, #e5c56e 0%, #b98c24 100%); color:#17120a}.btn-sub{background:#0d0d0f; color:var(--text); border:1px solid #5d5132}.detail-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:24px; margin-top:24px}.detail-item{background:linear-gradient(180deg, var(--panel), var(--panel2)); border:1px solid var(--line); border-radius:20px; padding:24px; box-shadow:0 14px 36px rgba(0,0,0,.28)}.detail-item h2{margin:0 0 14px; padding-left:12px; border-left:5px solid var(--gold); font-size:24px; color:var(--gold2)}@media (max-width:820px){.header-inner{flex-direction:column;align-items:flex-start}.page-title{font-size:40px}.cards,.detail-grid{grid-template-columns:1fr}.card,.detail-item{padding:22px}.body-large{font-size:22px}}</style><script src="meta-auto.js"></script></head><body><header class="site-header"><div class="site-wrap header-inner"><a class="brand" href="index.html">狙い目手帖</a><nav class="nav-links"><a href="index.html">トップ</a><a id="checkerLinkNav" href="checker.html">チェッカー</a></nav></div></header><main class="site-wrap page-main"><section class="hero"><p class="eyebrow">ARTICLE</p><h1 id="machineTitle" class="page-title">機種名</h1></section><section class="cards"><article class="card"><h2 class="section-title">基本情報</h2><div id="machineInfo" class="body-large"></div></article><article class="card"><h2 class="section-title">狙い目</h2><div id="strategy" class="body-large"></div><div class="action-row"><a id="checkerLinkCard" class="btn-primary" href="checker.html">狙い目チェッカー</a></div></article></section><section class="detail-grid"><article class="detail-item"><h2>機種概要</h2><div id="overview" class="body-text"></div></article><article class="detail-item"><h2>天井・恩恵</h2><div id="tenjo" class="body-text"></div></article><article class="detail-item"><h2>やめどき</h2><div id="yametoki" class="body-text"></div></article><article class="detail-item"><h2>リセット</h2><div id="reset" class="body-text"></div></article><article class="detail-item" style="grid-column:1/-1"><h2>注意点</h2><div id="caution" class="body-text"></div></article></section></main><script>(async()=>{const slug=new URLSearchParams(location.search).get('slug');const [machinesRes,detailsRes]=await Promise.all([fetch('assets/data/machines.json'),fetch('assets/data/machine-details.json').catch(()=>null)]);const machines=await machinesRes.json();const machine=machines.find(m=>m.slug===slug);if(!machine){document.body.innerHTML='機種が見つかりません';return;}let details={};try{details=detailsRes?await detailsRes.json():{};}catch(e){details={};}const detail=details[slug]||{};document.title=(machine.seo&&machine.seo.title)||machine.name;machineTitle.textContent=machine.name;machineInfo.textContent=machine.info||'';strategy.textContent=machine.strategy||'';overview.textContent=detail.overview||'現在整理中です。';tenjo.textContent=detail.tenjo||'現在整理中です。';yametoki.textContent=detail.yametoki||machine.yametoki||'現在整理中です。';reset.textContent=detail.reset||machine.resetStrategy||'現在整理中です。';caution.textContent=detail.caution||'現在整理中です。';const href='checker.html?slug='+machine.slug;checkerLinkNav.href=href;checkerLinkCard.href=href;})();</script></body></html>
