<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>機種ページ</title><style>:root{--bg:#0d0d0f;--panel:#17171a;--panel2:#1e1f23;--line:#34353a;--gold:#c9a13d;--gold2:#e5c56e;--text:#f3efe4;--muted:#c9c0ae}*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:radial-gradient(circle at top, rgba(201,161,61,.12), transparent 25%),linear-gradient(180deg,#09090a 0%, #121316 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}a{text-decoration:none}.site-wrap{width:min(1100px, calc(100% - 32px)); margin:0 auto}.site-header{background:rgba(8,8,9,.95); border-bottom:1px solid rgba(201,161,61,.35); position:sticky; top:0; z-index:10}.header-inner{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 0}.brand{font-size:30px; font-weight:800; color:var(--gold2)}.nav-links{display:flex; gap:18px; flex-wrap:wrap}.nav-links a{color:var(--text); font-weight:700}.page-main{padding:36px 0 56px}.hero{margin-bottom:24px; padding:28px; border:1px solid rgba(201,161,61,.2); border-radius:20px; background:linear-gradient(180deg, rgba(201,161,61,.08), rgba(201,161,61,.02))}.eyebrow{margin:0 0 10px; font-size:12px; letter-spacing:.18em; font-weight:800; color:var(--gold2)}.page-title{margin:0; font-size:52px; line-height:1.15; color:#fff8e6}.cards{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:24px}.card{background:linear-gradient(180deg, var(--panel), var(--panel2)); border:1px solid var(--line); border-radius:20px; padding:28px; box-shadow:0 14px 36px rgba(0,0,0,.28)}.section-title{margin:0 0 18px; padding-left:12px; border-left:5px solid var(--gold); font-size:28px; color:var(--gold2)}.body-large{font-size:24px; font-weight:700; white-space:pre-wrap}.body-text{margin:0; color:var(--text); line-height:1.9; font-size:17px}.detail-list{display:grid; gap:16px}.detail-item{padding-top:16px; border-top:1px solid rgba(201,161,61,.14)}.detail-item:first-child{padding-top:0;border-top:none}.detail-label{display:block; margin-bottom:8px; color:var(--gold2); font-weight:800; font-size:14px; letter-spacing:.08em}.action-row{margin-top:24px}.btn-primary,.btn-sub{display:inline-flex; align-items:center; justify-content:center; min-height:54px; padding:0 24px; border:none; border-radius:999px; font-size:18px; font-weight:900; cursor:pointer}.btn-primary{background:linear-gradient(180deg, #e5c56e 0%, #b98c24 100%); color:#17120a}.btn-sub{background:#0d0d0f; color:var(--text); border:1px solid #5d5132}@media (max-width:820px){.header-inner{flex-direction:column;align-items:flex-start}.page-title{font-size:40px}.cards{grid-template-columns:1fr}.card{padding:22px}.body-large{font-size:22px}}</style><script src="meta-auto.js"></script></head><body><header class="site-header"><div class="site-wrap header-inner"><a class="brand" href="index.html">狙い目手帖</a><nav class="nav-links"><a href="index.html">トップ</a><a id="checkerLinkNav" href="checker.html">チェッカー</a></nav></div></header><main class="site-wrap page-main"><section class="hero"><p class="eyebrow">ARTICLE</p><h1 id="machineTitle" class="page-title">機種名</h1></section><section class="cards"><article class="card"><h2 class="section-title">基本情報</h2><div id="machineInfo" class="body-large"></div><div class="detail-list"><div class="detail-item"><span class="detail-label">機種概要</span><p id="overview" class="body-text"></p></div><div class="detail-item"><span class="detail-label">天井・恩恵</span><p id="tenjo" class="body-text"></p></div><div class="detail-item"><span class="detail-label">狙い目</span><p id="strategyDetail" class="body-text"></p></div></div></article><article class="card"><h2 class="section-title">立ち回りメモ</h2><div class="detail-list"><div class="detail-item"><span class="detail-label">やめどき</span><p id="yametoki" class="body-text"></p></div><div class="detail-item"><span class="detail-label">リセット</span><p id="reset" class="body-text"></p></div><div class="detail-item"><span class="detail-label">注意点</span><p id="caution" class="body-text"></p></div></div><div class="action-row"><a id="checkerLinkCard" class="btn-primary" href="checker.html">狙い目チェッカー</a></div></article></section></main><script>(async()=>{const slug=new URLSearchParams(location.search).get('slug');const [machinesRes,detailRes]=await Promise.all([fetch('assets/data/machines.json'),fetch('assets/data/machine-details/'+slug+'.json').catch(()=>null)]);const machines=await machinesRes.json();const machine=machines.find(m=>m.slug===slug);if(!machine){document.body.innerHTML='機種が見つかりません';return;}let detail={};try{if(detailRes&&detailRes.ok){detail=await detailRes.json();}}catch(e){}document.title=(machine.seo&&machine.seo.title)||machine.name;machineTitle.textContent=machine.name;machineInfo.textContent=machine.info||'';overview.textContent=detail.overview||'準備中';tenjo.textContent=detail.tenjo||'準備中';strategyDetail.textContent=detail.strategy||machine.strategy||'準備中';yametoki.textContent=detail.yametoki||'準備中';reset.textContent=detail.reset||'準備中';caution.textContent=detail.caution||'準備中';const href='checker.html?slug='+machine.slug;checkerLinkNav.href=href;checkerLinkCard.href=href;})();</script></body></html>
