<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>機種ページ</title>
  
<style>
:root{
  --bg:#0d0d0f;
  --panel:#17171a;
  --panel2:#1e1f23;
  --line:#34353a;
  --gold:#c9a13d;
  --gold2:#e5c56e;
  --text:#f3efe4;
  --muted:#c9c0ae;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(circle at top, rgba(201,161,61,.12), transparent 25%),
    linear-gradient(180deg,#09090a 0%, #121316 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
}
a{text-decoration:none}
.site-wrap{
  width:min(1100px, calc(100% - 32px));
  margin:0 auto;
}
.site-header{
  background:rgba(8,8,9,.95);
  border-bottom:1px solid rgba(201,161,61,.35);
  position:sticky;
  top:0;
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:16px 0;
}
.brand{
  font-size:30px;
  font-weight:800;
  color:var(--gold2);
}
.nav-links{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}
.nav-links a{
  color:var(--text);
  font-weight:700;
}
.page-main{
  padding:36px 0 56px;
}
.hero{
  margin-bottom:24px;
  padding:28px;
  border:1px solid rgba(201,161,61,.2);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(201,161,61,.08), rgba(201,161,61,.02));
}
.eyebrow{
  margin:0 0 10px;
  font-size:12px;
  letter-spacing:.18em;
  font-weight:800;
  color:var(--gold2);
}
.page-title{
  margin:0;
  font-size:52px;
  line-height:1.15;
  color:#fff8e6;
}
.cards{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:24px;
}
.card{
  background:linear-gradient(180deg, var(--panel), var(--panel2));
  border:1px solid var(--line);
  border-radius:20px;
  padding:28px;
  box-shadow:0 14px 36px rgba(0,0,0,.28);
}
.section-title{
  margin:0 0 18px;
  padding-left:12px;
  border-left:5px solid var(--gold);
  font-size:28px;
  color:var(--gold2);
}
.body-large{
  font-size:24px;
  font-weight:700;
  white-space:pre-wrap;
}
.action-row{margin-top:24px}
.btn-primary{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:54px;
  padding:0 24px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg, #e5c56e 0%, #b98c24 100%);
  color:#17120a;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}
.field-label{
  display:block;
  margin-bottom:10px;
  color:var(--muted);
  font-weight:700;
}
.field-input{
  width:100%;
  height:54px;
  padding:0 16px;
  border-radius:14px;
  border:1px solid #5d5132;
  background:#0d0d0f;
  color:var(--text);
  font-size:18px;
}
.result-box{
  min-height:120px;
  padding:18px;
  border-radius:16px;
  border:1px solid rgba(201,161,61,.24);
  background:rgba(0,0,0,.22);
  font-size:28px;
  font-weight:800;
  color:#fff6dd;
}
@media (max-width:820px){
  .header-inner{flex-direction:column;align-items:flex-start}
  .page-title{font-size:40px}
  .cards{grid-template-columns:1fr}
  .card{padding:22px}
  .body-large{font-size:22px}
}
</style>

</head>
<body>
  <header class="site-header">
    <div class="site-wrap header-inner">
      <a class="brand" href="index.html">狙い目手帖</a>
      <nav class="nav-links">
        <a href="index.html">トップ</a>
        <a id="checker-link-nav" href="checker.html">チェッカー</a>
      </nav>
    </div>
  </header>

  <main class="site-wrap page-main">
    <section class="hero">
      <p class="eyebrow">ARTICLE</p>
      <h1 id="machine-title" class="page-title">機種名</h1>
    </section>

    <section class="cards">
      <article class="card">
        <h2 class="section-title">基本情報</h2>
        <div id="machine-info" class="body-large"></div>
      </article>

      <article class="card">
        <h2 class="section-title">狙い目</h2>
        <div id="strategy" class="body-large"></div>
        <div class="action-row">
          <a id="checker-link-card" class="btn-primary" href="checker.html">狙い目チェッカー</a>
        </div>
      </article>
    </section>
  </main>

  <script src="assets/js/machine-data.js"></script>
  <script src="assets/js/machine-page.js"></script>
  <script>
    (function () {
      const navLink = document.getElementById("checker-link-nav");
      const cardLink = document.getElementById("checker-link-card");
      const sync = () => {
        if (navLink && cardLink) cardLink.href = navLink.href;
      };
      const observer = new MutationObserver(sync);
      if (navLink) observer.observe(navLink, { attributes: true, attributeFilter: ["href"] });
      sync();
    })();
  </script>
</body>
</html>
