<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機種ページ | うちどころ。</title>
<meta name="description" content="機種ごとの狙い目記事ページです。結論と要点をスマホ向けに表示します。">
<link rel="stylesheet" href="assets/css/practical.css">
<script src="meta-auto.js"></script>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html"><img src="assets/img/logo.png" alt="うちどころ。" style="height:36px;width:auto;display:block;"></a>
    <div class="header-search-wrap">
      <span class="header-search-icon">🔍</span>
      <input id="headerSearch" class="header-search-input" type="search" placeholder="機種を検索">
      <div id="headerDropdown" class="header-dropdown"></div>
    </div>
    <nav class="nav-links">
      <a id="checkerLinkNav" href="checker.html">チェッカー</a>
    </nav>
  </div>
</header>
<main class="site-main">
  <section class="hero-panel article-hero">
    <p class="eyebrow">ARTICLE</p>
    <h1 id="machineTitle" class="page-title">機種名</h1>
    <p id="heroSub" class="hero-sub">結論を先に確認できます。</p>
  </section>

  <section class="section-stack">
    <article class="top-cta-bar">
      <p class="top-cta-copy"><strong>まずはチェッカーで即判定</strong>空き台の現在G数が分かるなら、記事を読む前にそのまま判定できます。</p>
      <a class="btn-main" id="checkerLinkTop" href="checker.html">今すぐ判定</a>
    </article>

    <article class="surface-card table-card">
      <h2 class="section-title">要点BOX</h2>
      <div id="summaryStrip" class="summary-strip"></div>
    </article>

    <article class="surface-card table-card">
      <h2 class="section-title">基本情報</h2>
      <table class="info-table">
        <tbody id="infoTableBody"></tbody>
      </table>
    </article>

    <article class="surface-card table-card">
      <h2 class="section-title">最大天井までの目安</h2>
      <table class="info-table compact-invest-table">
        <tbody id="investBody"></tbody>
      </table>
    </article>

    <div id="articleSections" class="article-sections"></div>

    <article class="surface-card">
      <h2 class="section-title">移動</h2>
      <div class="action-stack">
        <a class="btn-main" id="checkerLinkCard" href="checker.html">チェッカーを開く</a>
        <a class="btn-sub" href="index.html">一覧へ戻る</a>
      </div>
    </article>
  </section>
</main>

<footer>
  <div class="site-footer-inner">© 2026 うちどころ。</div>
</footer>

<script>
// ヘッダー検索
(function(){
  function normalizeText(value){
    return String(value || "")
      .toLowerCase()
      .replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
      .replace(/[\s\-\_ー]/g, "");
  }

  const searchInput = document.getElementById("headerSearch");
  const dropdown = document.getElementById("headerDropdown");
  let allMachines = [];

  fetch("assets/data/machines.json")
    .then(res => res.json())
    .then(machines => { allMachines = machines; });

  searchInput.addEventListener("input", function(){
    const query = normalizeText(this.value);
    dropdown.innerHTML = "";
    if (!query) { dropdown.style.display = "none"; return; }

    const matched = allMachines.filter(m => {
      const keywords = [m.name, m.slug, ...(m.aliases || [])].map(normalizeText).join("|");
      return keywords.includes(query);
    }).slice(0, 6);

    if (!matched.length) { dropdown.style.display = "none"; return; }

    matched.forEach(m => {
      const item = document.createElement("a");
      item.className = "header-dropdown-item";
      item.href = "machine.html?slug=" + m.slug;
      item.textContent = m.name;
      dropdown.appendChild(item);
    });
    dropdown.style.display = "block";
  });

  document.addEventListener("click", function(e){
    if (!e.target.closest(".header-search-wrap")) dropdown.style.display = "none";
  });
})();

async function loadJson(path){
  const res = await fetch(path);
  if (!res.ok) return null;
  return res.json();
}

function appendSummary(boxes){
  const strip = document.getElementById("summaryStrip");
  strip.innerHTML = "";
  (boxes || []).forEach(box => {
    const el = document.createElement("div");
    el.className = "summary-box";
    el.innerHTML = `<span class="summary-head">${box.label}</span><span class="summary-body">${box.value}</span>`;
    strip.appendChild(el);
  });
}

function appendInfo(rows){
  const body = document.getElementById("infoTableBody");
  body.innerHTML = "";
  rows.forEach(([th, td]) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<th>${th}</th><td>${td}</td>`;
    body.appendChild(tr);
  });
}

function appendInvest(rows){
  const body = document.getElementById("investBody");
  body.innerHTML = "";
  rows.forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<th>${row[0]}</th><td>${row[1]}</td>`;
    body.appendChild(tr);
  });
}

function appendSections(sections){
  const wrap = document.getElementById("articleSections");
  wrap.innerHTML = "";
  sections.forEach(section => {
    const article = document.createElement("article");
    article.className = "surface-card article-section";
    const bodyHtml = (section.body || []).map(text => `<p>${text}</p>`).join("");
    article.innerHTML = `<h2 class="section-title section-title-line">${section.title}</h2>${bodyHtml}`;
    wrap.appendChild(article);
  });
}

(async () => {
  const slug = new URLSearchParams(location.search).get("slug");
  const machines = await loadJson("assets/data/machines.json");
  if (!machines) {
    document.body.innerHTML = '<div class="simple-center"><div class="simple-box"><h1>読み込み失敗</h1><p>データの取得に失敗しました。</p><p><a class="btn-main" href="index.html">機種一覧へ戻る</a></p></div></div>';
    return;
  }

  const machine = machines.find(m => m.slug === slug);
  if (!machine) {
    document.body.innerHTML = '<div class="simple-center"><div class="simple-box"><h1>機種が見つかりません</h1><p>一覧から選び直してください。</p><p><a class="btn-main" href="index.html">機種一覧へ戻る</a></p></div></div>';
    return;
  }

  const detail = await loadJson(`assets/data/machine-details/${slug}.json`);
  const strategy = machine.strategy || "準備中";
  const info = machine.info || "未設定";
  const href = "checker.html?slug=" + machine.slug;

  document.title = ((machine.seo && machine.seo.title) || machine.name) + " | うちどころ。";
  document.getElementById("machineTitle").textContent = machine.name;
  document.getElementById("heroSub").textContent = detail?.lead || (strategy === "準備中" ? "この機種は現在調整中です。" : "記事より先に結論とチェッカー導線を確認できます。");
  document.getElementById("checkerLinkNav").href = href;
  document.getElementById("checkerLinkTop").href = href;
  document.getElementById("checkerLinkCard").href = href;

  if (detail) {
    appendSummary(detail.summaryBoxes || []);
    appendInfo(detail.factTable || [["機種名", machine.name], ["タイプ", info], ["狙い目", strategy]]);
    appendInvest(detail.investTable || []);
    appendSections(detail.sections || []);
  } else {
    appendSummary([{ label:"狙い目", value:strategy }, { label:"機種区分", value:info }, { label:"状態", value:"詳細反映中" }]);
    appendInfo([["機種名", machine.name], ["タイプ", info], ["狙い目", strategy], ["メモ", "詳細作成中"]]);
    appendInvest([]);
    appendSections([{ title:"メモ", body:["この機種は現在、記事本文の詳細調整中です。"] }]);
  }
})();
</script>
</body>
</html>
