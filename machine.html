<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機種ページ | うちどころ。</title>
<meta name="description" content="機種ごとの狙い目記事ページです。結論と要点をスマホ向けに表示します。">
<link rel="stylesheet" href="assets/css/practical.css">
<script src="meta-auto.js"></script>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html"><img src="assets/img/logo.png" alt="うちどころ。" style="height:36px;width:auto;display:block;"></a>
    <div class="header-search-wrap">
      <span class="header-search-icon">🔍</span>
      <input id="headerSearch" class="header-search-input" type="search" placeholder="機種を検索">
      <div id="headerDropdown" class="header-dropdown"></div>
    </div>
  </div>
</header>
<main class="site-main">

  <section class="article-hero">
    <p class="eyebrow">ARTICLE</p>
    <h1 id="machineTitle" class="page-title">機種名</h1>
    <p id="heroSub" class="hero-sub"></p>
  </section>

  <section class="article-section-wrap">

    <div class="article-block">
      <p class="block-label">▶ 狙い目チェッカー</p>
      <div class="checker-card">
        <div class="mode-toggle">
          <input type="radio" name="mode" id="modeNormal" value="normal" checked>
          <label for="modeNormal">通常</label>
          <input type="radio" name="mode" id="modeReset" value="reset">
          <label for="modeReset">リセット</label>
        </div>
        <input id="gameInput" class="game-input" type="number" inputmode="numeric" placeholder="現在G数を入力">
        <div id="checkerResult" class="checker-result result-wait">
          <p class="result-label">判定</p>
          <p class="result-text">G数を入力してください</p>
        </div>
        <a id="settingLink" class="setting-dummy-link" href="#">
          設定判別ツール（準備中）<span>›</span>
        </a>
      </div>
    </div>

    <div class="article-block">
      <p class="block-label">▶ 要点</p>
      <div id="summaryGrid" class="summary-grid"></div>
    </div>

    <div class="article-block">
      <p class="block-label">▶ 基本情報</p>
      <table class="info-table">
        <tbody id="infoTableBody"></tbody>
      </table>
    </div>

    <div class="article-block">
      <p class="block-label">▶ 詳細</p>
      <div id="articleSections"></div>
    </div>

  </section>

</main>

<footer>
  <div class="site-footer-inner">
    <div class="footer-links">
      <a href="contact.html">お問い合わせ</a>
      <a href="privacy.html">プライバシーポリシー</a>
    </div>
    <p class="footer-copy">© 2026 うちどころ。</p>
  </div>
</footer>

<script>
// ヘッダー検索
(function(){
  function normalizeText(value){
    return String(value || "")
      .toLowerCase()
      .replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
      .replace(/[\s\-\_ー]/g, "");
  }

  const searchInput = document.getElementById("headerSearch");
  const dropdown = document.getElementById("headerDropdown");
  let allMachines = [];

  fetch("assets/data/machines.json")
    .then(res => res.json())
    .then(machines => { allMachines = machines; });

  searchInput.addEventListener("input", function(){
    const query = normalizeText(this.value);
    dropdown.innerHTML = "";
    if (!query) { dropdown.style.display = "none"; return; }

    const matched = allMachines.filter(m => {
      const keywords = [m.name, m.slug, ...(m.aliases || [])].map(normalizeText).join("|");
      return keywords.includes(query);
    }).slice(0, 6);

    if (!matched.length) { dropdown.style.display = "none"; return; }

    matched.forEach(m => {
      const item = document.createElement("a");
      item.className = "header-dropdown-item";
      item.href = "machine.html?slug=" + m.slug;
      item.textContent = m.name;
      dropdown.appendChild(item);
    });
    dropdown.style.display = "block";
  });

  document.addEventListener("click", function(e){
    if (!e.target.closest(".header-search-wrap")) dropdown.style.display = "none";
  });
})();

// データ読み込み
async function loadJson(path){
  const res = await fetch(path);
  if (!res.ok) return null;
  return res.json();
}

(async () => {
  const slug = new URLSearchParams(location.search).get("slug");
  const machines = await loadJson("assets/data/machines.json");
  if (!machines) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#667788;">データの取得に失敗しました。<br><a href="index.html" style="color:#f5b941;">一覧へ戻る</a></div>';
    return;
  }

  const machine = machines.find(m => m.slug === slug);
  if (!machine) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#667788;">機種が見つかりません。<br><a href="index.html" style="color:#f5b941;">一覧へ戻る</a></div>';
    return;
  }

  const detail = await loadJson(`assets/data/machine-details/${slug}.json`);

  // タイトル（document.titleはmeta-auto.jsが担当）
  document.getElementById("machineTitle").textContent = machine.name;
  document.getElementById("heroSub").textContent = detail?.lead || "";

  // 設定判別リンク（将来差し替え用）
  document.getElementById("settingLink").href = `setting.html?slug=${slug}`;

  // チェッカー
  const checkerData = machine.checker || {};
  const gameInput = document.getElementById("gameInput");
  const checkerResult = document.getElementById("checkerResult");

  function judge(){
    const g = parseInt(gameInput.value);
    const mode = document.querySelector('input[name="mode"]:checked').value;
    const data = mode === "reset" ? checkerData.reset : checkerData.normal;
    if (!data || isNaN(g)) {
      checkerResult.className = "checker-result result-wait";
      checkerResult.querySelector(".result-text").textContent = "G数を入力してください";
      return;
    }
    if (g >= data.excellent) {
      checkerResult.className = "checker-result result-ok";
      checkerResult.querySelector(".result-text").textContent = "◎ 狙い目OK！積極的に着席を検討";
    } else if (g >= data.good) {
      checkerResult.className = "checker-result result-ok";
      checkerResult.querySelector(".result-text").textContent = "◯ 狙い目OK　交換率次第で候補";
    } else {
      checkerResult.className = "checker-result result-ng";
      checkerResult.querySelector(".result-text").textContent = `× まだ早い　${data.good}G以上を目安に`;
    }
  }

  gameInput.addEventListener("input", judge);
  document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener("change", () => { gameInput.value = ""; judge(); }));

  // 要点BOX
  const summaryGrid = document.getElementById("summaryGrid");
  (detail?.summaryBoxes || [
    { label: "天井", value: machine.strategy || "-" },
    { label: "ヤメ時", value: "-" }
  ]).forEach(box => {
    const div = document.createElement("div");
    div.className = "summary-item";
    div.innerHTML = `<span class="s-label">${box.label}</span><span class="s-value">${box.value}</span>`;
    summaryGrid.appendChild(div);
  });

  // 基本情報テーブル
  const infoBody = document.getElementById("infoTableBody");
  (detail?.factTable || [["機種名", machine.name]]).forEach(([th, td]) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<th>${th}</th><td>${td}</td>`;
    infoBody.appendChild(tr);
  });

  // 詳細セクション
  const articleSections = document.getElementById("articleSections");
  (detail?.sections || []).forEach(section => {
    const div = document.createElement("div");
    div.className = "article-item";
    div.innerHTML = `<p class="article-title">${section.title}</p>${(section.body || []).map(t => `<p class="article-body">${t}</p>`).join("")}`;
    articleSections.appendChild(div);
  });
})();
</script>
</body>
</html>
